<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>洛洛历险记 · 联机版</title>
<style>
  :root {
    --bg: #060b18; --panel: rgba(10,16,30,0.88); --cyan: #00d4ff; --gold: #f0c040;
    --red: #ff4060; --green: #40e890; --purple: #a070ff; --orange: #ff8040;
    --text: #d0d4e0; --dim: #6070a0; --border: rgba(0,200,255,0.22);
    --energy: #ffe860; --pink: #ff70a0; --warm: #ffb088; --online: #40e890;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;min-height:100vh;padding:4px 4px 95px;color:var(--text);overflow-x:hidden;}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 30% 10%,rgba(0,212,255,0.03) 0%,transparent 60%),radial-gradient(ellipse at 70% 90%,rgba(255,112,160,0.03) 0%,transparent 60%);}
  .game-container{max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:3px;position:relative;z-index:1;}
  .title-area{text-align:center;padding:2px 0;}
  .title-area h1{font-size:1rem;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--cyan),var(--online),var(--warm),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s ease infinite;background-size:300% 300%;}
  @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .title-area .sub{font-size:0.36rem;color:var(--dim);letter-spacing:1px;}
  .online-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--online);margin-right:3px;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .status-row{display:flex;gap:1px;flex-wrap:wrap;}
  .status-card{flex:1;min-width:30px;background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:5px;padding:3px 1px;text-align:center;transition:all 0.3s;}
  .status-card .lbl{font-size:0.28rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.3px;}
  .status-card .val{font-size:0.5rem;font-weight:800;margin-top:1px;}
  .val.cyan{color:var(--cyan);}.val.gold{color:var(--gold);}.val.red{color:var(--red);}.val.green{color:var(--green);}.val.purple{color:var(--purple);}.val.orange{color:var(--orange);}.val.pink{color:var(--pink);}.val.warm{color:var(--warm);}.val.online{color:var(--online);}

  .nav-scroll{overflow-x:auto;display:flex;gap:1px;padding:1px 0;scrollbar-width:none;}
  .nav-scroll::-webkit-scrollbar{display:none;}
  .nav-btn{background:rgba(14,22,40,0.6);border:1px solid rgba(255,255,255,0.05);color:var(--dim);padding:3px 5px;border-radius:10px;font-size:0.38rem;cursor:pointer;white-space:nowrap;transition:all 0.3s;font-weight:600;}
  .nav-btn:hover,.nav-btn.active{border-color:var(--online);color:var(--online);background:rgba(64,232,144,0.08);}
  .nav-btn.online-tab{border-color:rgba(64,232,144,0.3);}

  .panel-grid{display:flex;flex-direction:column;gap:2px;}
  details.panel{background:var(--panel);backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:7px;overflow:hidden;transition:all 0.3s;}
  details.panel[open]{box-shadow:0 2px 15px rgba(0,200,255,0.06);}
  details.panel summary{padding:4px 7px;cursor:pointer;font-size:0.48rem;font-weight:700;color:var(--warm);background:linear-gradient(135deg,rgba(255,176,136,0.02),rgba(0,212,255,0.02));list-style:none;display:flex;justify-content:space-between;}
  details.panel summary::-webkit-details-marker{display:none;}
  .panel-content{padding:4px 7px;display:grid;grid-template-columns:1fr 1fr;gap:1px 3px;font-size:0.42rem;}
  .clickable{display:flex;justify-content:space-between;align-items:center;padding:3px 4px;border:1px solid rgba(255,255,255,0.03);border-radius:3px;cursor:pointer;transition:all 0.2s;margin:1px 0;grid-column:1/-1;}
  .clickable:hover{background:rgba(255,176,136,0.04);border-color:rgba(255,176,136,0.15);}
  .clickable .cname{font-weight:700;color:var(--warm);font-size:0.42rem;}
  .clickable .cinfo{font-size:0.36rem;color:var(--dim);}
  .clickable.usable{border-color:rgba(64,232,144,0.15);}
  .clickable.danger{border-color:rgba(255,64,96,0.15);}
  .clickable.online{border-color:rgba(64,232,144,0.25);}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.006);}
  .bar{grid-column:1/-1;height:2px;background:rgba(255,255,255,0.015);border-radius:1px;margin:1px 0;overflow:hidden;}
  .bar-fill{height:100%;border-radius:1px;transition:width 0.6s;}
  .bar-fill.hp{background:linear-gradient(90deg,#ff4060,#ff6080);}.bar-fill.ex{background:linear-gradient(90deg,#f0c040,#ffe080);}

  .story-box{background:var(--panel);backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:9px;padding:7px 9px;line-height:1.55;font-size:0.58rem;min-height:18px;box-shadow:0 4px 18px rgba(0,0,0,0.3);position:relative;overflow:hidden;}
  .story-box .scene{font-size:0.36rem;color:var(--dim);letter-spacing:1px;margin-bottom:1px;position:relative;z-index:1;}
  .story-box .narrative{white-space:pre-wrap;position:relative;z-index:1;}
  .story-box .hint{font-size:0.4rem;color:var(--warm);margin-top:2px;font-style:italic;border-left:2px solid var(--warm);padding-left:3px;position:relative;z-index:1;}

  .choices{display:flex;flex-direction:column;gap:1px;}
  .choice-btn{background:linear-gradient(135deg,rgba(14,22,40,0.7),rgba(10,16,35,0.8));border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:5px;font-size:0.5rem;text-align:left;cursor:pointer;transition:all 0.3s;}
  .choice-btn:hover{background:rgba(255,176,136,0.04);border-color:var(--warm);color:var(--warm);}
  .choice-btn .num{display:inline-block;background:linear-gradient(135deg,var(--warm),var(--gold));color:#0a0f1a;width:14px;height:14px;border-radius:50%;text-align:center;line-height:14px;font-weight:900;font-size:0.44rem;margin-right:2px;}

  .input-row{display:flex;gap:2px;}
  .input-row input{flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:12px;font-size:0.5rem;outline:none;}
  .input-row input:focus{border-color:var(--warm);}
  .input-row button{background:rgba(255,176,136,0.1);border:1px solid var(--warm);color:var(--warm);padding:4px 9px;border-radius:12px;font-weight:800;cursor:pointer;font-size:0.46rem;}

  .quick-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
  .quick-btn{width:24px;height:24px;border-radius:50%;background:rgba(14,22,40,0.6);border:1px solid rgba(255,255,255,0.06);color:var(--dim);font-size:0.28rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;}
  .quick-btn:hover{border-color:var(--warm);color:var(--warm);transform:translateY(-1px);}
  .quick-btn .ico{font-size:0.45rem;}

  .bottom-bar{position:fixed;bottom:2px;left:50%;transform:translateX(-50%);max-width:640px;width:calc(100% - 8px);z-index:100;background:rgba(10,16,35,0.92);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:8px;padding:2px 4px;display:flex;gap:1px;align-items:center;}
  .bottom-bar input{flex:1;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);color:var(--text);padding:2px 4px;border-radius:5px;font-size:0.32rem;outline:none;}
  .bottom-bar button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--dim);padding:2px 3px;border-radius:5px;font-size:0.3rem;cursor:pointer;}

  .notification{position:fixed;top:5px;left:50%;transform:translateX(-50%);background:rgba(10,16,35,0.95);border:1px solid var(--warm);border-radius:5px;padding:3px 8px;color:var(--warm);font-size:0.4rem;z-index:999;animation:notifySlide 0.4s ease,notifyFade 0.5s ease 2.5s forwards;max-width:90%;pointer-events:none;}
  @keyframes notifySlide{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes notifyFade{to{opacity:0;transform:translateX(-50%) translateY(-3px)}}

  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
  .modal-overlay.active{display:flex;}
  .modal-dialog{background:var(--panel);backdrop-filter:blur(30px);border:2px solid var(--border);border-radius:11px;padding:9px;max-width:460px;width:92%;max-height:72vh;overflow-y:auto;color:var(--text);}
  .modal-dialog h3{color:var(--warm);font-size:0.6rem;margin-bottom:3px;text-align:center;}
  .modal-dialog .close-btn{float:right;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--dim);padding:2px 5px;border-radius:3px;cursor:pointer;font-size:0.35rem;}
  .modal-dialog .chat-log{max-height:100px;overflow-y:auto;font-size:0.42rem;line-height:1.4;margin:3px 0;padding:4px;background:rgba(0,0,0,0.2);border-radius:5px;}
  .modal-dialog .chat-input-row{display:flex;gap:1px;margin-bottom:3px;}
  .modal-dialog .chat-input-row input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:7px;font-size:0.4rem;outline:none;}
  .modal-dialog .chat-input-row button{background:rgba(255,176,136,0.12);border:1px solid var(--warm);color:var(--warm);padding:3px 7px;border-radius:7px;font-weight:700;cursor:pointer;font-size:0.38rem;}
  .modal-dialog .cmd-row{display:flex;gap:1px;flex-wrap:wrap;}
  .modal-dialog .cmd-btn{background:rgba(255,176,136,0.03);border:1px solid rgba(255,255,255,0.06);color:var(--dim);padding:2px 4px;border-radius:5px;font-size:0.35rem;cursor:pointer;transition:all 0.3s;}
  .modal-dialog .cmd-btn:hover{border-color:var(--warm);color:var(--warm);}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px 3px;font-size:0.4rem;margin-bottom:3px;}

  .drawer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:998;display:none;}
  .drawer-overlay.active{display:block;}
  .sys-drawer{position:fixed;top:0;right:-100%;width:88%;max-width:400px;height:100%;background:rgba(10,16,35,0.97);backdrop-filter:blur(30px);border-left:2px solid var(--border);z-index:999;transition:right 0.35s;display:flex;flex-direction:column;}
  .sys-drawer.open{right:0;}
  .drawer-header{padding:8px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;}
  .drawer-body{flex:1;overflow-y:auto;padding:6px;font-size:0.46rem;line-height:1.5;}
  .drawer-input-row{display:flex;gap:2px;padding:5px;border-top:1px solid rgba(255,255,255,0.04);}
  .drawer-input-row input{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);padding:4px;border-radius:7px;font-size:0.44rem;outline:none;}
  .drawer-input-row button{background:rgba(255,176,136,0.15);border:1px solid var(--warm);color:var(--warm);padding:4px 7px;border-radius:7px;cursor:pointer;font-size:0.42rem;}
  .chat-msg{padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02);}
  .chat-msg .sender{font-weight:700;}
  .chat-msg .time{font-size:0.3rem;color:var(--dim);}
</style>
</head>
<body>
<div class="game-container">
  <div class="title-area"><h1><span class="online-dot"></span>洛洛历险记·联机版</h1><div class="sub" id="onlineStatus">🔴 离线模式 | 点击💬系统→连接服务器</div></div>

  <div class="status-row">
    <div class="status-card"><div class="lbl">主角</div><div class="val cyan" id="sName">洛洛</div></div>
    <div class="status-card"><div class="lbl">Lv</div><div class="val gold" id="sLevel">1</div></div>
    <div class="status-card"><div class="lbl">HP</div><div class="val red" id="sHP">100</div></div>
    <div class="status-card"><div class="lbl">ATK</div><div class="val orange" id="sATK">15</div></div>
    <div class="status-card"><div class="lbl">💰</div><div class="val gold" id="sGold">500</div></div>
    <div class="status-card"><div class="lbl">🌐</div><div class="val online" id="sOnline">0</div></div>
    <div class="status-card"><div class="lbl">回合</div><div class="val pink" id="sRound">0</div></div>
  </div>

  <div class="nav-scroll" id="navRow">
    <button class="nav-btn active" data-panel="main">📋主</button><button class="nav-btn" data-panel="warriors">⚔️战士</button><button class="nav-btn" data-panel="bag">🎒背包</button><button class="nav-btn" data-panel="equip">🛡️装备</button><button class="nav-btn" data-panel="skilltree">📜技能</button><button class="nav-btn" data-panel="dungeon">👹副本</button><button class="nav-btn online-tab" data-panel="lobby">🌐大厅</button><button class="nav-btn online-tab" data-panel="chat">💬聊天</button><button class="nav-btn online-tab" data-panel="team">👥组队</button><button class="nav-btn online-tab" data-panel="trade">🤝交易</button>
  </div>

  <div class="panel-grid" id="panelContainer"></div>
  <div class="story-box"><div class="scene" id="sceneTag">· 第一章 ·</div><div class="narrative" id="narrative">正在加载...</div><div class="hint" id="sysHint"></div></div>
  <div class="choices" id="choices"></div>
  <div class="input-row"><input type="text" id="customInput" placeholder="✍ 行动..."><button id="customSendBtn">执行</button></div>
  <div class="quick-row">
    <button class="quick-btn" id="btnSys"><span class="ico">💬</span></button>
    <button class="quick-btn" id="btnConnect"><span class="ico">🌐</span></button>
    <button class="quick-btn" id="btnSave"><span class="ico">💾</span></button>
    <button class="quick-btn" id="btnReset"><span class="ico">🔄</span></button>
  </div>
</div>

<div class="bottom-bar"><input type="password" id="apiKeyInput" placeholder="API Key"><button id="saveKeyBtn">💾Key</button><span id="keyStatus">未配置</span></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-dialog" id="modalDialog"></div></div>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="sys-drawer" id="sysDrawer">
  <div class="drawer-header"><span style="color:var(--warm);">💬 系统控制台</span><button onclick="closeDrawer()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--dim);padding:2px 5px;border-radius:5px;">✕</button></div>
  <div class="drawer-body" id="sysChatLog"><div style="color:var(--dim);">🤖 就绪。输入修改指令或 /connect 连接服务器</div></div>
  <div class="drawer-input-row"><input id="sysChatInput" placeholder="修改/联机指令..."><button id="sysChatSend">执行</button></div>
</div>

<script>
// ==================== 联机系统核心 ====================
const WS={ws:null,connected:false,playerId:'player_'+Math.random().toString(36).substr(2,8),playerName:'洛洛',room:'world',onlinePlayers:[],chatMessages:[],team:{id:null,members:[]},pendingTrades:[],friends:[]};

function connectServer(url){
  if(WS.ws){WS.ws.close();}
  try{
    WS.ws=new WebSocket(url||'ws://localhost:3000');
    WS.ws.onopen=()=>{
      WS.connected=true;
      document.getElementById('onlineStatus').innerHTML='<span class="online-dot"></span>🟢 已连接 | '+WS.playerName;
      document.getElementById('sOnline').textContent=WS.onlinePlayers.length+1;
      WS.ws.send(JSON.stringify({type:'join',id:WS.playerId,name:WS.playerName,level:D.player.level,city:D.city}));
      notify('🌐 已连接到服务器！');
      addChatMsg('系统','欢迎来到机兽世界联机大厅！');
    };
    WS.ws.onmessage=(e)=>{
      const msg=JSON.parse(e.data);
      handleWSMessage(msg);
    };
    WS.ws.onclose=()=>{
      WS.connected=false;
      document.getElementById('onlineStatus').innerHTML='🔴 离线模式 | 服务器断开';
      notify('🔴 与服务器断开连接');
    };
    WS.ws.onerror=()=>{
      notify('❌ 无法连接到服务器，请确认服务器已启动');
      document.getElementById('onlineStatus').innerHTML='🔴 离线模式 | 连接失败';
    };
  }catch(e){notify('❌ 连接失败：'+e.message);}
}

function handleWSMessage(msg){
  switch(msg.type){
    case 'playerList':
      WS.onlinePlayers=msg.players||[];
      document.getElementById('sOnline').textContent=WS.onlinePlayers.length+1;
      renderPanels();
      break;
    case 'chat':
      WS.chatMessages.push(msg);
      if(WS.chatMessages.length>100)WS.chatMessages.shift();
      addChatMsg(msg.sender,msg.content);
      break;
    case 'teamInvite':
      notify(`👥 ${msg.from}邀请你加入队伍！`);
      break;
    case 'teamUpdate':
      WS.team=msg.team;
      renderPanels();
      break;
    case 'tradeRequest':
      WS.pendingTrades.push(msg);
      notify(`🤝 ${msg.from}发起交易请求！`);
      break;
    case 'battleRequest':
      notify(`⚔️ ${msg.from}向你发起PVP挑战！`);
      break;
    case 'bossEvent':
      notify(`👹 世界BOSS事件：${msg.content}`);
      break;
    case 'friendOnline':
      notify(`👤 ${msg.name}上线了`);
      break;
    default:break;
  }
}

function sendWS(data){if(WS.connected&&WS.ws){WS.ws.send(JSON.stringify(data));}}

function sendChat(channel,content){
  if(WS.connected){sendWS({type:'chat',channel,content,sender:WS.playerName,id:WS.playerId,time:new Date().toLocaleTimeString()});}
  else{WS.chatMessages.push({sender:WS.playerName,content,time:new Date().toLocaleTimeString(),channel});addChatMsg(WS.playerName,content);}
}

function addChatMsg(sender,content){
  const log=document.getElementById('chatLog');
  if(!log)return;
  const div=document.createElement('div');div.className='chat-msg';
  div.innerHTML=`<span class="sender" style="color:${sender==='系统'?'var(--gold)':'var(--cyan)'};">${sender}</span>：${content}`;
  log.appendChild(div);log.scrollTop=log.scrollHeight;
}

function inviteTeam(playerId){sendWS({type:'teamInvite',target:playerId,from:WS.playerName,fromId:WS.playerId});notify('👥 已发送组队邀请');}
function requestTrade(playerId){sendWS({type:'tradeRequest',target:playerId,from:WS.playerName,fromId:WS.playerId});notify('🤝 已发送交易请求');}
function requestPVP(playerId){sendWS({type:'battleRequest',target:playerId,from:WS.playerName,fromId:WS.playerId});notify('⚔️ 已发送PVP挑战');}
function addFriend(playerName){if(!WS.friends.includes(playerName)){WS.friends.push(playerName);notify('👤 已添加'+playerName+'为好友');}}

// ==================== 游戏数据 ====================
const D={player:{name:'洛洛',level:1,hp:100,maxHp:100,atk:15,def:8,spd:10,gold:500,exp:0,expToLevel:100,skillPoints:0,mood:'PLEASED'},warriors:{'霹雳火':{name:'霹雳火',role:'守城大将',personality:'忠诚热血',level:1,hp:150,maxHp:150,atk:25,def:15,spd:12,skill:'雷霆半月斩',skillLevel:1,loyalty:90,mood:'PROUD',chatHistory:[],memories:[]},'风火轮':{name:'风火轮',role:'侦察兵',personality:'活泼机灵',level:1,hp:80,maxHp:80,atk:12,def:6,spd:22,skill:'旋风轮',skillLevel:1,loyalty:85,mood:'EXCITED',chatHistory:[],memories:[]}},availableWarriors:['急先锋','力霸天','冲击波','龙卷风','超音速'],enemies:{'金铁兽':{level:20,hp:800,maxHp:800,atk:40,def:15,spd:10,alive:true,dropTable:[{name:'修复装置',chance:0.8}]},'猛虎王':{level:45,hp:4000,maxHp:4000,atk:80,def:40,spd:20,alive:true,dropTable:[{name:'猛虎之牙',chance:0.1}]}},dungeons:{'能源之城外围':{level:5,enemies:['金铁兽'],rewards:{exp:30,gold:100}},'雷霆殿深处':{level:40,enemies:['猛虎王'],rewards:{exp:500,gold:1000}}},city:'时光之城',bag:{'修复装置':3,'能量块':5,'合击技卷轴':1},equipment:{weapon:null,armor:null,accessory:null},equipmentDB:{'烈焰之剑':{slot:'weapon',atk:10,rarity:'精良'},'守护铠甲':{slot:'armor',def:8,hp:30,rarity:'精良'},'疾风之靴':{slot:'accessory',spd:5,rarity:'稀有'},'猛虎之牙':{slot:'weapon',atk:18,rarity:'史诗'}},skillTree:{'攻击强化':{level:0,max:5,cost:1,eff:'atk',val:3},'防御强化':{level:0,max:5,cost:1,eff:'def',val:2},'生命强化':{level:0,max:5,cost:1,eff:'maxHp',val:15}},shopItems:{'修复装置':{price:100},'能量块':{price:50},'合击技卷轴':{price:300}},achievements:[],signIn:{days:0,todaySigned:false},round:0,chatHistory:[],apiKey:'',processing:false,currentPanel:'main'};

// ==================== 原有功能（精简但完整） ====================
function getExpToLevel(lv){return Math.floor(100*Math.pow(1.5,lv-1));}
function calcDamage(a,b){const base=Math.max(1,a.atk-b.def);const crit=Math.random()<0.1;return Math.floor(base*(crit?2:1)*(0.9+Math.random()*0.2));}
function applyEquipStats(){
  let ba=0,bd=0,bh=0;
  Object.values(D.equipment).forEach(eq=>{if(eq&&D.equipmentDB[eq]){const e=D.equipmentDB[eq];ba+=e.atk||0;bd+=e.def||0;bh+=e.hp||0;}});
  Object.values(D.skillTree).forEach(s=>{if(s.level>0){if(s.eff==='atk')ba+=s.val*s.level;if(s.eff==='def')bd+=s.val*s.level;if(s.eff==='maxHp')bh+=s.val*s.level;}});
  const lv=D.player.level;D.player.atk=15+lv*2+ba;D.player.def=8+lv+bd;D.player.maxHp=100+lv*20+bh;D.player.hp=Math.min(D.player.hp,D.player.maxHp);
}
function notify(msg){const n=document.createElement('div');n.className='notification';n.textContent=msg;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);}
function autoSave(){localStorage.setItem('aeig_online_v1',JSON.stringify(D));}
function loadSave(){const r=localStorage.getItem('aeig_online_v1');if(!r)return false;try{Object.assign(D,JSON.parse(r));applyEquipStats();return true;}catch(e){return false;}}
function openModal(h){document.getElementById('modalDialog').innerHTML=h;document.getElementById('modalOverlay').classList.add('active');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
function barHTML(type,pct){return `<div class="bar"><div class="bar-fill ${type}" style="width:${Math.min(100,pct)}%"></div></div>`;}
function setByPath(path,val){const parts=path.split('.');let obj=D;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=Math.max(-999999,val);}

async function fightEnemy(enemyName){
  const enemy=D.enemies[enemyName];if(!enemy||!enemy.alive||D.player.hp<=0)return;closeModal();
  let eHp=enemy.hp,log='',turn=0;const ally=Object.values(D.warriors).find(w=>w.hp>0);
  while(eHp>0&&D.player.hp>0&&turn<50){turn++;
    const p=calcDamage(D.player,enemy);eHp-=p.dmg;log+=`⚔️-${p.dmg}${p.crit?'💥':''} `;
    if(eHp<=0){log+='🎉击败！';break;}
    if(ally&&turn%3===0)eHp-=calcDamage(ally,enemy).dmg;
    D.player.hp-=calcDamage(enemy,D.player).dmg;
  }
  if(D.player.hp>0&&eHp<=0){enemy.alive=false;D.player.exp+=enemy.level*5;D.player.gold+=enemy.level*10;
    if(enemy.dropTable)enemy.dropTable.forEach(d=>{if(Math.random()<d.chance){D.bag[d.name]=(D.bag[d.name]||0)+1;notify('🎒'+d.name);}});
    if(WS.connected)sendWS({type:'bossDefeated',enemy:enemyName,by:WS.playerName});
  }
  document.getElementById('narrative').textContent=log;
  while(D.player.exp>=D.player.expToLevel){D.player.exp-=D.player.expToLevel;D.player.level++;D.player.expToLevel=getExpToLevel(D.player.level);D.player.skillPoints++;notify('⬆️Lv.'+D.player.level);}
  applyEquipStats();renderAll();autoSave();
}
function equipItem(name){const eq=D.equipmentDB[name];if(!eq||(D.bag[name]||0)<=0)return;const old=D.equipment[eq.slot];if(old)D.bag[old]=(D.bag[old]||0)+1;D.equipment[eq.slot]=name;D.bag[name]--;applyEquipStats();notify('🛡️装备'+name);renderAll();autoSave();closeModal();}
function learnSkill(name){const s=D.skillTree[name];if(!s||s.level>=s.max||D.player.skillPoints<s.cost)return;D.player.skillPoints-=s.cost;s.level++;applyEquipStats();notify('📜'+name+'→Lv.'+s.level);renderAll();autoSave();}
function dailySign(){if(D.signIn.todaySigned)return;D.signIn.days++;D.signIn.todaySigned=true;D.player.gold+=[50,100,150,200,300,500,800][Math.min(D.signIn.days-1,6)];notify('📅签到第'+D.signIn.days+'天');renderAll();autoSave();}
function buyItem(name){const item=D.shopItems[name];if(!item||D.player.gold<item.price)return;D.player.gold-=item.price;D.bag[name]=(D.bag[name]||0)+1;notify('🛒'+name);renderAll();autoSave();}

// ==================== 面板系统 ====================
const RARITY_COLORS={精良:'var(--green)',稀有:'var(--cyan)',史诗:'var(--purple)',传说:'var(--orange)'};
const panelRenderers={
  main:()=>{const p=D.player;let h='';h+=`<div class="stat-row"><span>❤️HP</span><span>${p.hp}/${p.maxHp}</span></div>`+barHTML('hp',p.hp/p.maxHp*100);h+=`<div class="stat-row"><span>✨经验</span><span>${p.exp}/${p.expToLevel}</span></div>`+barHTML('ex',p.exp/p.expToLevel*100);h+=`<div class="stat-row"><span>⭐技能点</span><span style="color:var(--warm);">${p.skillPoints}</span></div>`;Object.values(D.warriors).forEach(w=>{h+=`<div class="clickable" onclick="openWarriorModal('${w.name}')"><span class="cname">${w.name}</span><span class="cinfo">❤️${w.hp} 忠${w.loyalty}</span></div>`;});return h;},
  warriors:()=>{let h='';Object.values(D.warriors).forEach(w=>{h+=`<div class="clickable" onclick="openWarriorModal('${w.name}')"><span class="cname">${w.name}</span><span class="cinfo">Lv.${w.level}</span></div>`;});h+=`<div style="grid-column:1/-1;color:var(--dim);font-size:0.36rem;">可招募</div>`;D.availableWarriors.forEach(w=>{h+=`<div class="clickable" onclick="handle('招募${w}')"><span class="cname">${w}</span></div>`;});h+=`<div style="grid-column:1/-1;color:var(--red);font-size:0.36rem;">敌人</div>`;Object.entries(D.enemies).filter(([,e])=>e.alive).forEach(([k,e])=>{h+=`<div class="clickable danger" onclick="fightEnemy('${k}')"><span class="cname">${k}</span><span class="cinfo">Lv.${e.level}</span></div>`;});return h;},
  bag:()=>{let h='';Object.entries(D.bag).filter(([,v])=>v>0).forEach(([k,v])=>{const eq=D.equipmentDB[k];h+=`<div class="clickable usable" onclick="${eq?`equipItem('${k}')`:`notify('📦${k}×${v}')`}"><span class="cname">${eq?'🛡️':''}${k}</span><span class="cinfo">×${v}${eq?' [装备]':''}</span></div>`;});if(!h)h='<div style="color:var(--dim);grid-column:1/-1;">空空</div>';return h;},
  equip:()=>{let h='';['weapon','armor','accessory'].forEach(s=>{const eq=D.equipment[s];h+=`<div class="clickable" onclick="${eq?`notify('已装备${eq}')`:`notify('空槽')`}"><span class="cname">${s==='weapon'?'⚔️':s==='armor'?'🛡️':'💍'}${s}</span><span class="cinfo">${eq||'空'}</span></div>`;});return h;},
  skilltree:()=>{let h='';h+=`<div style="grid-column:1/-1;color:var(--warm);font-size:0.36rem;">⭐技能点：${D.player.skillPoints}</div>`;Object.entries(D.skillTree).forEach(([n,s])=>{h+=`<div class="clickable${s.level<s.max?' usable':''}" onclick="learnSkill('${n}')"><span class="cname">📜${n}</span><span class="cinfo">Lv.${s.level}/${s.max} ${s.cost}点</span></div>`;});return h;},
  dungeon:()=>{let h='';Object.entries(D.dungeons).forEach(([n,d])=>{h+=`<div class="clickable" onclick="fightEnemy('${d.enemies[0]}')"><span class="cname">👹${n}</span><span class="cinfo">Lv.${d.level}</span></div>`;});return h;},
  lobby:()=>{
    let h='';h+=`<div style="grid-column:1/-1;color:var(--online);font-size:0.4rem;">🌐 在线玩家 (${WS.onlinePlayers.length+1})</div>`;
    h+=`<div class="clickable online"><span class="cname"><span class="online-dot"></span>${WS.playerName} (你)</span><span class="cinfo">Lv.${D.player.level}</span></div>`;
    WS.onlinePlayers.forEach(p=>{
      h+=`<div class="clickable online"><span class="cname">${p.name}</span><span class="cinfo">Lv.${p.level} ${p.city||''}</span></div>`;
      h+=`<div class="cmd-row" style="grid-column:1/-1;margin-bottom:2px;">
        <button class="cmd-btn" onclick="inviteTeam('${p.id}')">👥组队</button>
        <button class="cmd-btn" onclick="requestTrade('${p.id}')">🤝交易</button>
        <button class="cmd-btn" onclick="requestPVP('${p.id}')">⚔️PVP</button>
        <button class="cmd-btn" onclick="addFriend('${p.name}')">👤好友</button>
      </div>`;
    });
    if(WS.onlinePlayers.length===0)h+='<div style="color:var(--dim);grid-column:1/-1;font-size:0.36rem;">暂无其他玩家在线</div>';
    if(!WS.connected)h+='<div style="color:var(--dim);grid-column:1/-1;font-size:0.36rem;">未连接服务器，点击💬系统→输入/connect</div>';
    return h;
  },
  chat:()=>{
    let h='';h+=`<div style="grid-column:1/-1;font-size:0.38rem;color:var(--dim);">💬 世界聊天</div>`;
    h+=`<div class="chat-log" id="chatLog" style="grid-column:1/-1;max-height:120px;">${WS.chatMessages.slice(-20).map(m=>`<div class="chat-msg"><span class="sender" style="color:${m.sender==='系统'?'var(--gold)':'var(--cyan)'};">${m.sender}</span>：${m.content} <span class="time">${m.time||''}</span></div>`).join('')||'<div style="color:var(--dim);">暂无消息</div>'}</div>`;
    h+=`<div class="chat-input-row" style="grid-column:1/-1;"><input id="chatInput" placeholder="输入聊天内容..."><button onclick="sendChatMsg()">发送</button></div>`;
    return h;
  },
  team:()=>{
    let h='';h+=`<div style="grid-column:1/-1;color:var(--warm);font-size:0.38rem;">👥 队伍</div>`;
    if(WS.team.members.length===0){h+='<div style="color:var(--dim);grid-column:1/-1;">尚未组队，在大厅邀请玩家</div>';}
    else{WS.team.members.forEach(m=>{h+=`<div class="clickable"><span class="cname">${m.name}</span><span class="cinfo">Lv.${m.level}</span></div>`;});}
    h+=`<div style="grid-column:1/-1;color:var(--dim);font-size:0.36rem;margin-top:4px;">队伍加成：ATK+${WS.team.members.length*5} DEF+${WS.team.members.length*3}</div>`;
    return h;
  },
  trade:()=>{
    let h='';h+=`<div style="grid-column:1/-1;color:var(--warm);font-size:0.38rem;">🤝 交易</div>`;
    if(WS.pendingTrades.length===0){h+='<div style="color:var(--dim);grid-column:1/-1;">暂无交易请求</div>';}
    else{WS.pendingTrades.forEach(t=>{h+=`<div class="clickable" onclick="acceptTrade('${t.fromId}')"><span class="cname">🤝${t.from}</span><span class="cinfo">请求交易</span></div>`;});}
    return h;
  }
};

function sendChatMsg(){const input=document.getElementById('chatInput');if(!input)return;const msg=input.value.trim();if(!msg)return;input.value='';sendChat('world',msg);renderPanels();}
function acceptTrade(fromId){notify('🤝 交易已接受');WS.pendingTrades=WS.pendingTrades.filter(t=>t.fromId!==fromId);renderPanels();}

function renderPanels(){
  const container=document.getElementById('panelContainer');container.innerHTML='';
  Object.entries(panelRenderers).forEach(([key,renderer])=>{
    const det=document.createElement('details');det.className='panel';if(key===D.currentPanel)det.open=true;
    const titles={main:'👤主角',warriors:'⚔️战士',bag:'🎒背包',equip:'🛡️装备',skilltree:'📜技能',dungeon:'👹副本',lobby:'🌐联机大厅',chat:'💬聊天',team:'👥组队',trade:'🤝交易'};
    det.innerHTML=`<summary><span>${titles[key]}</span></summary><div class="panel-content">${renderer()}</div>`;container.appendChild(det);
  });
}
function showPanel(name){D.currentPanel=name;renderPanels();document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');if(b.dataset.panel===name)b.classList.add('active');});}
function updateStatusBar(){
  document.getElementById('sLevel').textContent=D.player.level;document.getElementById('sHP').textContent=D.player.hp;
  document.getElementById('sATK').textContent=D.player.atk;document.getElementById('sGold').textContent=D.player.gold;
  document.getElementById('sOnline').textContent=WS.onlinePlayers.length+(WS.connected?1:0);document.getElementById('sRound').textContent=D.round;
}
function renderAll(){updateStatusBar();renderPanels();applyEquipStats();}

// ==================== AI剧情 ====================
async function callAI(msg){
  if(!D.apiKey)throw new Error('API Key');
  const msgs=[{role:'system',content:'你是《洛洛历险记》RPG主持人。当前：'+JSON.stringify({player:D.player,city:D.city,round:D.round})},...D.chatHistory];if(msg)msgs.push({role:'user',content:msg});
  const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+D.apiKey},body:JSON.stringify({model:'deepseek-chat',messages:msgs,temperature:0.9,max_tokens:800})});
  if(!resp.ok)throw new Error(`API ${resp.status}`);
  const d=await resp.json();const txt=d.choices[0].message.content;let parsed;
  try{const m=txt.match(/\{[\s\S]*\}/);parsed=JSON.parse(m?m[0]:txt);}catch(e){parsed={narrative:txt,options:['继续','探索'],ending:'🔥'};}
  if(msg)D.chatHistory.push({role:'user',content:msg});D.chatHistory.push({role:'assistant',content:JSON.stringify(parsed)});if(D.chatHistory.length>30)D.chatHistory=D.chatHistory.slice(-30);
  return parsed;
}
function renderResponse(data){
  document.getElementById('narrative').textContent=data.narrative||'';document.getElementById('sysHint').textContent=data.ending||'';
  while(D.player.exp>=D.player.expToLevel){D.player.exp-=D.player.expToLevel;D.player.level++;D.player.expToLevel=getExpToLevel(D.player.level);D.player.skillPoints++;}
  applyEquipStats();const cDiv=document.getElementById('choices');cDiv.innerHTML='';
  (data.options||['继续','探索']).forEach((o,i)=>{const b=document.createElement('button');b.className='choice-btn';b.innerHTML=`<span class="num">${i+1}.</span>${o}`;b.onclick=()=>handle(o);cDiv.appendChild(b);});
  renderAll();autoSave();
}
async function handle(msg){if(D.processing||!D.apiKey)return;D.processing=true;D.round++;document.getElementById('narrative').innerHTML='<span class="loading">⏳...</span>';try{const data=await callAI(msg);renderResponse(data);}catch(e){document.getElementById('narrative').textContent='❌ '+e.message;}D.processing=false;autoSave();}

// ==================== 系统控制台 ====================
function openDrawer(){document.getElementById('sysDrawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('active');}
function closeDrawer(){document.getElementById('sysDrawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('active');}
async function sysChatSend(){
  const input=document.getElementById('sysChatInput');const msg=input.value.trim();if(!msg)return;input.value='';
  const log=document.getElementById('sysChatLog');
  if(msg.startsWith('/connect')){const url=msg.split(' ')[1];connectServer(url);log.innerHTML+='<div style="color:var(--online);">🌐 正在连接...</div>';return;}
  if(msg.startsWith('/disconnect')){if(WS.ws)WS.ws.close();WS.connected=false;document.getElementById('onlineStatus').innerHTML='🔴 离线模式';notify('已断开连接');return;}
  log.innerHTML+=`<div style="color:var(--gold);">👤 ${msg}</div>`;
  if(!D.apiKey){const actions=[];const lower=msg.toLowerCase();
    if(lower.includes('hp')){const m=msg.match(/(\d+)/);if(m)actions.push({path:'player.hp',value:parseInt(m[0])});}
    else if(lower.includes('金币')){const m=msg.match(/(\d+)/);if(m)actions.push({path:'player.gold',value:parseInt(m[0])});}
    actions.forEach(a=>setByPath(a.path,a.value));if(actions.length>0){applyEquipStats();renderAll();autoSave();}
    log.innerHTML+=`<div style="color:var(--warm);">✅ 已执行</div>`;
  }
  log.scrollTop=log.scrollHeight;
}

// ==================== 初始化 ====================
function init(){
  const sk=localStorage.getItem('deepseek_api_key');if(sk){D.apiKey=sk;document.getElementById('apiKeyInput').value=sk;document.getElementById('keyStatus').textContent='✅';}
  const has=loadSave();renderAll();if(has){updateStatusBar();document.getElementById('narrative').textContent='📡重连。第'+D.round+'回合。';}
  document.getElementById('saveKeyBtn').onclick=()=>{const k=document.getElementById('apiKeyInput').value.trim();if(!k.startsWith('sk-')){notify('Key以sk-开头');return;}D.apiKey=k;localStorage.setItem('deepseek_api_key',k);document.getElementById('keyStatus').textContent='✅';if(!has)handle('我是洛洛，在时光之城醒来。');};
  document.getElementById('customSendBtn').onclick=async()=>{const inp=document.getElementById('customInput');const t=inp.value.trim();if(!t)return;inp.value='';await handle(t);};
  document.getElementById('customInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('customSendBtn').click();};
  document.getElementById('btnSys').onclick=openDrawer;document.getElementById('btnConnect').onclick=()=>connectServer();
  document.getElementById('sysChatSend').onclick=sysChatSend;document.getElementById('sysChatInput').onkeydown=e=>{if(e.key==='Enter')sysChatSend();};
  document.getElementById('btnSave').onclick=()=>{autoSave();notify('💾已存档');};
  document.getElementById('btnReset').onclick=()=>{if(confirm('重开？')){localStorage.removeItem('aeig_online_v1');location.reload();}};
  document.querySelectorAll('.nav-btn').forEach(b=>{b.onclick=()=>showPanel(b.dataset.panel);});
  document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)closeModal();};
  if(!has&&D.apiKey)handle('我是洛洛，在时光之城醒来。');
}
document.addEventListener('DOMContentLoaded',init);
</script>
