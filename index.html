<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>洛洛历险记 · 手机联机版</title>
<style>
  :root {
    --bg: #060b18; --panel: rgba(10,16,30,0.88); --cyan: #00d4ff; --gold: #f0c040;
    --red: #ff4060; --green: #40e890; --purple: #a070ff; --orange: #ff8040;
    --text: #d0d4e0; --dim: #6070a0; --border: rgba(0,200,255,0.22);
    --energy: #ffe860; --warm: #ffb088; --online: #40e890;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;padding:4px 4px 90px;color:var(--text);overflow-x:hidden;}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 30% 10%,rgba(0,212,255,0.03) 0%,transparent 60%),radial-gradient(ellipse at 70% 90%,rgba(255,112,160,0.03) 0%,transparent 60%);}
  .game-container{max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:3px;position:relative;z-index:1;}
  .title-area{text-align:center;padding:2px 0;}
  .title-area h1{font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--online),var(--warm));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .online-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--online);margin-right:3px;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .status-row{display:flex;gap:1px;flex-wrap:wrap;}
  .status-card{flex:1;min-width:28px;background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:5px;padding:3px 1px;text-align:center;}
  .status-card .lbl{font-size:0.28rem;color:var(--dim);text-transform:uppercase;}
  .status-card .val{font-size:0.48rem;font-weight:800;}
  .val.cyan{color:var(--cyan);}.val.gold{color:var(--gold);}.val.red{color:var(--red);}.val.green{color:var(--green);}.val.online{color:var(--online);}.val.warm{color:var(--warm);}.val.pink{color:var(--pink);}

  .nav-scroll{overflow-x:auto;display:flex;gap:1px;padding:1px 0;scrollbar-width:none;}
  .nav-scroll::-webkit-scrollbar{display:none;}
  .nav-btn{background:rgba(14,22,40,0.6);border:1px solid rgba(255,255,255,0.05);color:var(--dim);padding:3px 5px;border-radius:10px;font-size:0.38rem;cursor:pointer;white-space:nowrap;transition:all 0.3s;font-weight:600;}
  .nav-btn:hover,.nav-btn.active{border-color:var(--online);color:var(--online);background:rgba(64,232,144,0.08);}

  .panel-grid{display:flex;flex-direction:column;gap:2px;}
  details.panel{background:var(--panel);backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
  details.panel summary{padding:4px 7px;cursor:pointer;font-size:0.48rem;font-weight:700;color:var(--warm);background:linear-gradient(135deg,rgba(255,176,136,0.02),rgba(0,212,255,0.02));list-style:none;display:flex;justify-content:space-between;}
  details.panel summary::-webkit-details-marker{display:none;}
  .panel-content{padding:4px 7px;display:grid;grid-template-columns:1fr 1fr;gap:1px 3px;font-size:0.42rem;}
  .clickable{display:flex;justify-content:space-between;align-items:center;padding:3px 4px;border:1px solid rgba(255,255,255,0.03);border-radius:3px;cursor:pointer;transition:all 0.2s;margin:1px 0;grid-column:1/-1;}
  .clickable:hover{background:rgba(255,176,136,0.04);border-color:rgba(255,176,136,0.15);}
  .clickable .cname{font-weight:700;color:var(--warm);font-size:0.42rem;}
  .clickable .cinfo{font-size:0.36rem;color:var(--dim);}
  .clickable.online{border-color:rgba(64,232,144,0.25);}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.006);}
  .bar{grid-column:1/-1;height:2px;background:rgba(255,255,255,0.015);border-radius:1px;margin:1px 0;overflow:hidden;}
  .bar-fill{height:100%;border-radius:1px;transition:width 0.6s;}
  .bar-fill.hp{background:linear-gradient(90deg,#ff4060,#ff6080);}.bar-fill.ex{background:linear-gradient(90deg,#f0c040,#ffe080);}

  .story-box{background:var(--panel);backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:9px;padding:7px 9px;line-height:1.55;font-size:0.58rem;min-height:18px;}
  .story-box .scene{font-size:0.36rem;color:var(--dim);letter-spacing:1px;margin-bottom:1px;}
  .story-box .narrative{white-space:pre-wrap;}
  .story-box .hint{font-size:0.4rem;color:var(--warm);margin-top:2px;font-style:italic;border-left:2px solid var(--warm);padding-left:3px;}

  .choices{display:flex;flex-direction:column;gap:1px;}
  .choice-btn{background:linear-gradient(135deg,rgba(14,22,40,0.7),rgba(10,16,35,0.8));border:1px solid var(--border);color:var(--text);padding:5px 7px;border-radius:5px;font-size:0.5rem;text-align:left;cursor:pointer;transition:all 0.3s;}
  .choice-btn:hover{background:rgba(255,176,136,0.04);border-color:var(--warm);color:var(--warm);}
  .choice-btn .num{display:inline-block;background:linear-gradient(135deg,var(--warm),var(--gold));color:#0a0f1a;width:14px;height:14px;border-radius:50%;text-align:center;line-height:14px;font-weight:900;font-size:0.44rem;margin-right:2px;}

  .input-row{display:flex;gap:2px;}
  .input-row input{flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:12px;font-size:0.5rem;outline:none;}
  .input-row button{background:rgba(255,176,136,0.1);border:1px solid var(--warm);color:var(--warm);padding:4px 9px;border-radius:12px;font-weight:800;cursor:pointer;font-size:0.46rem;}

  .quick-row{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
  .quick-btn{width:24px;height:24px;border-radius:50%;background:rgba(14,22,40,0.6);border:1px solid rgba(255,255,255,0.06);color:var(--dim);font-size:0.28rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;}
  .quick-btn:hover{border-color:var(--warm);color:var(--warm);}
  .quick-btn .ico{font-size:0.45rem;}

  .bottom-bar{position:fixed;bottom:2px;left:50%;transform:translateX(-50%);max-width:640px;width:calc(100% - 8px);z-index:100;background:rgba(10,16,35,0.92);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:8px;padding:2px 4px;display:flex;gap:1px;align-items:center;}
  .bottom-bar input{flex:1;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);color:var(--text);padding:2px 4px;border-radius:5px;font-size:0.32rem;outline:none;}
  .bottom-bar button{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--dim);padding:2px 3px;border-radius:5px;font-size:0.3rem;cursor:pointer;}

  .notification{position:fixed;top:5px;left:50%;transform:translateX(-50%);background:rgba(10,16,35,0.95);border:1px solid var(--warm);border-radius:5px;padding:3px 8px;color:var(--warm);font-size:0.4rem;z-index:999;animation:notifySlide 0.4s ease,notifyFade 0.5s ease 2.5s forwards;max-width:90%;pointer-events:none;}
  @keyframes notifySlide{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes notifyFade{to{opacity:0}}

  /* 联机弹窗 */
  .room-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:center;}
  .room-overlay.active{display:flex;}
  .room-dialog{background:var(--panel);backdrop-filter:blur(30px);border:2px solid var(--online);border-radius:14px;padding:16px;max-width:420px;width:90%;text-align:center;color:var(--text);}
  .room-dialog h3{color:var(--online);font-size:0.75rem;margin-bottom:8px;}
  .room-dialog .big-btn{display:block;width:100%;margin:6px 0;padding:12px;border-radius:10px;font-size:0.6rem;font-weight:800;cursor:pointer;border:none;}
  .room-dialog .btn-create{background:var(--online);color:#060b18;}
  .room-dialog .btn-join{background:var(--cyan);color:#060b18;}
  .room-dialog input{width:100%;margin:6px 0;padding:8px;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:0.5rem;outline:none;text-align:center;}
  .room-dialog .close-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);color:var(--dim);padding:6px 14px;border-radius:8px;cursor:pointer;margin-top:8px;font-size:0.45rem;}
</style>
</head>
<body>

<div class="game-container">
  <div class="title-area"><h1><span class="online-dot"></span>洛洛历险记·联机版</h1><div class="sub" id="onlineStatus">🔴 未联机 | 点击 🌐联机 按钮</div></div>

  <div class="status-row">
    <div class="status-card"><div class="lbl">主角</div><div class="val cyan" id="sName">洛洛</div></div>
    <div class="status-card"><div class="lbl">Lv</div><div class="val gold" id="sLevel">1</div></div>
    <div class="status-card"><div class="lbl">HP</div><div class="val red" id="sHP">100</div></div>
    <div class="status-card"><div class="lbl">ATK</div><div class="val orange" id="sATK">15</div></div>
    <div class="status-card"><div class="lbl">💰</div><div class="val gold" id="sGold">500</div></div>
    <div class="status-card"><div class="lbl">🌐</div><div class="val online" id="sOnline">0</div></div>
    <div class="status-card"><div class="lbl">回合</div><div class="val pink" id="sRound">0</div></div>
  </div>

  <div class="nav-scroll" id="navRow">
    <button class="nav-btn active" data-panel="main">📋主</button>
    <button class="nav-btn" data-panel="warriors">⚔️战士</button>
    <button class="nav-btn" data-panel="bag">🎒背包</button>
    <button class="nav-btn" data-panel="dungeon">👹副本</button>
    <button class="nav-btn" data-panel="lobby">🌐联机</button>
  </div>

  <div class="panel-grid" id="panelContainer"></div>
  <div class="story-box">
    <div class="scene" id="sceneTag">· 第一章 ·</div>
    <div class="narrative" id="narrative">正在加载...</div>
    <div class="hint" id="sysHint"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="input-row"><input type="text" id="customInput" placeholder="✍ 行动..."><button id="customSendBtn">执行</button></div>
  <div class="quick-row">
    <button class="quick-btn" id="btnRoom"><span class="ico">🌐</span></button>
    <button class="quick-btn" id="btnSave"><span class="ico">💾</span></button>
    <button class="quick-btn" id="btnReset"><span class="ico">🔄</span></button>
  </div>
</div>

<div class="bottom-bar"><input type="password" id="apiKeyInput" placeholder="API Key"><button id="saveKeyBtn">💾Key</button><span id="keyStatus">未配置</span></div>

<!-- 联机弹窗 -->
<div class="room-overlay" id="roomOverlay">
  <div class="room-dialog" id="roomDialog"></div>
</div>

<script>
// ==================== 简易P2P联机引擎 ====================
// 原理：一台手机创建RTCPeerConnection，生成offer；另一台手机输入offer连接。
// 通过手动交换连接码（简化版：用复制粘贴的方式交换信令）

const P2P = {
  pc: null,
  dc: null, // DataChannel
  connected: false,
  isHost: false,
  roomCode: '',
  peers: [],
  chatMessages: [],

  // 创建房间（房主）
  async createRoom() {
    P2P.isHost = true;
    P2P.pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    
    // 创建DataChannel
    P2P.dc = P2P.pc.createDataChannel('game');
    setupDataChannel(P2P.dc);
    
    // 生成offer
    const offer = await P2P.pc.createOffer();
    await P2P.pc.setLocalDescription(offer);
    
    // 等待ICE候选收集完成
    await new Promise(resolve => {
      P2P.pc.onicecandidate = (e) => {
        if (!e.candidate) resolve(); // 收集完成
      };
    });
    
    // 生成房间码（Base64编码的SDP）
    P2P.roomCode = btoa(JSON.stringify(P2P.pc.localDescription));
    return P2P.roomCode;
  },

  // 加入房间
  async joinRoom(roomCode) {
    P2P.isHost = false;
    P2P.pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    
    P2P.pc.ondatachannel = (e) => {
      P2P.dc = e.channel;
      setupDataChannel(P2P.dc);
    };
    
    // 解析房间码
    const remoteDesc = JSON.parse(atob(roomCode));
    await P2P.pc.setRemoteDescription(remoteDesc);
    
    // 创建answer
    const answer = await P2P.pc.createAnswer();
    await P2P.pc.setLocalDescription(answer);
    
    // 等待ICE
    await new Promise(resolve => {
      P2P.pc.onicecandidate = (e) => {
        if (!e.candidate) resolve();
      };
    });
    
    // 返回answer（房主需要这个来建立连接）
    // 简化版：双方在同一WiFi下，ICE会自动连通
    return true;
  },

  send(data) {
    if (P2P.dc && P2P.dc.readyState === 'open') {
      P2P.dc.send(JSON.stringify(data));
    }
  },

  disconnect() {
    if (P2P.dc) P2P.dc.close();
    if (P2P.pc) P2P.pc.close();
    P2P.connected = false;
    P2P.isHost = false;
    P2P.roomCode = '';
  }
};

function setupDataChannel(dc) {
  dc.onopen = () => {
    P2P.connected = true;
    document.getElementById('onlineStatus').innerHTML = '<span class="online-dot"></span>🟢 已联机 | ' + (P2P.isHost ? '房主' : '成员');
    document.getElementById('sOnline').textContent = '2';
    notify('🌐 联机成功！两台手机已连接');
    if (P2P.isHost) {
      P2P.send({ type: 'chat', sender: '系统', content: '另一位玩家加入了你的房间！' });
    }
  };
  
  dc.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleP2PMessage(msg);
    } catch (err) {}
  };
  
  dc.onclose = () => {
    P2P.connected = false;
    document.getElementById('onlineStatus').innerHTML = '🔴 联机断开';
    document.getElementById('sOnline').textContent = '0';
    notify('🔴 联机已断开');
  };
}

function handleP2PMessage(msg) {
  switch (msg.type) {
    case 'chat':
      P2P.chatMessages.push(msg);
      notify(`💬 ${msg.sender}: ${msg.content}`);
      renderPanels();
      break;
    case 'battle':
      notify(`⚔️ ${msg.sender}发起协同攻击！`);
      // 协同战斗：双方一起打BOSS
      if (msg.enemy && D.enemies[msg.enemy]) {
        const enemy = D.enemies[msg.enemy];
        const dmg = Math.floor(Math.random() * 50) + 30;
        enemy.hp -= dmg;
        notify(`🤝 协同攻击！${msg.sender}造成${dmg}伤害`);
        if (enemy.hp <= 0) {
          enemy.alive = false;
          D.player.gold += 200;
          notify('🎉 联手击败' + msg.enemy + '！+200💰');
        }
        renderAll();
      }
      break;
    case 'trade':
      notify(`🤝 ${msg.sender}发来交易：${msg.item}`);
      break;
  }
}

// ==================== 联机弹窗 ====================
function showRoomDialog() {
  const dialog = document.getElementById('roomDialog');
  
  if (P2P.connected) {
    // 已联机状态
    dialog.innerHTML = `
      <h3>🌐 联机中</h3>
      <p style="color:var(--online);font-size:0.55rem;">🟢 两台手机已连接</p>
      <p style="font-size:0.45rem;color:var(--dim);">你是：${P2P.isHost ? '🏠 房主' : '👤 成员'}</p>
      <div style="margin:8px 0;">
        <button class="big-btn" style="background:var(--orange);" onclick="sendCoopAttack()">⚔️ 协同攻击</button>
        <button class="big-btn" style="background:var(--cyan);" onclick="sendTrade()">🤝 发起交易</button>
      </div>
      <input type="text" id="p2pChatInput" placeholder="输入聊天消息..." style="text-align:left;">
      <button class="big-btn" style="background:var(--purple);" onclick="sendP2PChat()">💬 发送消息</button>
      <button class="close-btn" onclick="disconnectP2P()">🔌 断开联机</button>
      <button class="close-btn" onclick="closeRoomDialog()">关闭</button>
    `;
  } else {
    // 未联机状态
    dialog.innerHTML = `
      <h3>🌐 手机直连联机</h3>
      <p style="font-size:0.45rem;color:var(--dim);margin-bottom:8px;">两台手机连同一个WiFi即可</p>
      
      <button class="big-btn btn-create" onclick="createRoom()">🏠 创建房间（房主）</button>
      <p style="font-size:0.4rem;color:var(--dim);margin:4px 0;">—— 或者 ——</p>
      <p style="font-size:0.4rem;color:var(--dim);">输入房主的房间码加入：</p>
      <input type="text" id="roomCodeInput" placeholder="粘贴房间码...">
      <button class="big-btn btn-join" onclick="joinRoom()">👤 加入房间</button>
      <button class="close-btn" onclick="closeRoomDialog()">关闭</button>
    `;
  }
  
  document.getElementById('roomOverlay').classList.add('active');
}

function closeRoomDialog() {
  document.getElementById('roomOverlay').classList.remove('active');
}

async function createRoom() {
  try {
    const code = await P2P.createRoom();
    const dialog = document.getElementById('roomDialog');
    dialog.innerHTML = `
      <h3>🏠 房间已创建</h3>
      <p style="font-size:0.45rem;color:var(--gold);">你的房间码（点击复制）：</p>
      <div style="background:rgba(0,0,0,0.3);padding:8px;border-radius:6px;margin:6px 0;word-break:break-all;font-size:0.4rem;cursor:pointer;" onclick="copyRoomCode()" id="roomCodeDisplay">${code}</div>
      <p style="font-size:0.38rem;color:var(--dim);">让另一台手机在"加入房间"中粘贴此码</p>
      <p style="font-size:0.38rem;color:var(--online);">等待另一位玩家加入...</p>
      <button class="close-btn" onclick="closeRoomDialog()">关闭（保持房间）</button>
    `;
  } catch (e) {
    notify('❌ 创建房间失败：' + e.message);
  }
}

function copyRoomCode() {
  const code = P2P.roomCode;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => notify('📋 房间码已复制！发送给另一台手机'));
  } else {
    // 备用方案：选中文本
    const display = document.getElementById('roomCodeDisplay');
    const range = document.createRange();
    range.selectNode(display);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    notify('📋 请长按选中房间码复制');
  }
}

async function joinRoom() {
  const codeInput = document.getElementById('roomCodeInput');
  const code = codeInput.value.trim();
  if (!code) { notify('❌ 请粘贴房间码'); return; }
  
  try {
    await P2P.joinRoom(code);
    notify('✅ 已加入房间！等待连接...');
    closeRoomDialog();
  } catch (e) {
    notify('❌ 加入失败：' + e.message + '。请确认房间码正确且两台手机在同一WiFi');
  }
}

function disconnectP2P() {
  P2P.disconnect();
  closeRoomDialog();
  renderAll();
}

function sendP2PChat() {
  const input = document.getElementById('p2pChatInput');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  P2P.send({ type: 'chat', sender: '洛洛', content: msg });
  P2P.chatMessages.push({ sender: '我', content: msg });
  notify('💬 已发送');
  renderPanels();
}

function sendCoopAttack() {
  const enemies = Object.entries(D.enemies).filter(([,e]) => e.alive);
  if (enemies.length === 0) { notify('没有可攻击的敌人'); return; }
  const enemy = enemies[0][0];
  P2P.send({ type: 'battle', sender: '洛洛', enemy });
  notify('⚔️ 发起协同攻击！');
}

function sendTrade() {
  P2P.send({ type: 'trade', sender: '洛洛', item: '修复装置×1' });
  notify('🤝 已发送交易请求');
}

// ==================== 游戏数据（精简版） ====================
const D = {
  player: { name: '洛洛', level: 1, hp: 100, maxHp: 100, atk: 15, def: 8, gold: 500, exp: 0, expToLevel: 100 },
  warriors: {
    '霹雳火': { name: '霹雳火', level: 1, hp: 150, maxHp: 150, atk: 25, def: 15, loyalty: 90 },
    '风火轮': { name: '风火轮', level: 1, hp: 80, maxHp: 80, atk: 12, def: 6, loyalty: 85 }
  },
  enemies: {
    '金铁兽': { level: 20, hp: 800, maxHp: 800, atk: 40, def: 15, alive: true },
    '猛虎王': { level: 45, hp: 4000, maxHp: 4000, atk: 80, def: 40, alive: true }
  },
  bag: { '修复装置': 3, '能量块': 5 },
  city: '时光之城',
  round: 0, apiKey: '', processing: false, currentPanel: 'main'
};

function getExpToLevel(lv) { return Math.floor(100 * Math.pow(1.5, lv - 1)); }
function calcDamage(a, b) { const base = Math.max(1, a.atk - b.def); return Math.floor(base * (0.9 + Math.random() * 0.2)); }
function notify(msg) { const n = document.createElement('div'); n.className = 'notification'; n.textContent = msg; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
function autoSave() { localStorage.setItem('aeig_p2p_v1', JSON.stringify(D)); }
function loadSave() { const r = localStorage.getItem('aeig_p2p_v1'); if (!r) return false; try { Object.assign(D, JSON.parse(r)); return true; } catch (e) { return false; } }
function barHTML(type, pct) { return `<div class="bar"><div class="bar-fill ${type}" style="width:${Math.min(100, pct)}%"></div></div>`; }

async function fightEnemy(enemyName) {
  const enemy = D.enemies[enemyName];
  if (!enemy || !enemy.alive || D.player.hp <= 0) return;
  let eHp = enemy.hp, log = '', turn = 0;
  while (eHp > 0 && D.player.hp > 0 && turn < 50) {
    turn++;
    const p = calcDamage(D.player, enemy); eHp -= p; log += `⚔️-${p} `;
    if (eHp <= 0) { log += '🎉击败！'; break; }
    D.player.hp -= calcDamage(enemy, D.player);
  }
  if (D.player.hp > 0 && eHp <= 0) {
    enemy.alive = false; D.player.exp += enemy.level * 5; D.player.gold += enemy.level * 10;
    if (P2P.connected) P2P.send({ type: 'battle', sender: '洛洛', enemy: enemyName });
  }
  document.getElementById('narrative').textContent = log;
  while (D.player.exp >= D.player.expToLevel) {
    D.player.exp -= D.player.expToLevel; D.player.level++; D.player.expToLevel = getExpToLevel(D.player.level);
    D.player.maxHp += 20; D.player.hp = D.player.maxHp; D.player.atk += 3; notify('⬆️Lv.' + D.player.level);
  }
  renderAll(); autoSave();
}

const panelRenderers = {
  main: () => {
    const p = D.player; let h = '';
    h += `<div class="stat-row"><span>❤️HP</span><span>${p.hp}/${p.maxHp}</span></div>` + barHTML('hp', p.hp / p.maxHp * 100);
    h += `<div class="stat-row"><span>✨经验</span><span>${p.exp}/${p.expToLevel}</span></div>` + barHTML('ex', p.exp / p.expToLevel * 100);
    Object.values(D.warriors).forEach(w => { h += `<div class="clickable" onclick="notify('${w.name}：❤️${w.hp} 忠诚${w.loyalty}')"><span class="cname">${w.name}</span><span class="cinfo">❤️${w.hp}</span></div>`; });
    return h;
  },
  warriors: () => {
    let h = '';
    Object.values(D.warriors).forEach(w => { h += `<div class="clickable"><span class="cname">${w.name}</span><span class="cinfo">Lv.${w.level} ATK${w.atk}</span></div>`; });
    h += `<div style="grid-column:1/-1;color:var(--red);font-size:0.36rem;">敌人</div>`;
    Object.entries(D.enemies).filter(([, e]) => e.alive).forEach(([k, e]) => { h += `<div class="clickable danger" onclick="fightEnemy('${k}')"><span class="cname">${k}</span><span class="cinfo">Lv.${e.level} HP${e.hp}</span></div>`; });
    return h;
  },
  bag: () => {
    let h = '';
    Object.entries(D.bag).filter(([, v]) => v > 0).forEach(([k, v]) => { h += `<div class="clickable usable" onclick="notify('📦${k}×${v}')"><span class="cname">📦${k}</span><span class="cinfo">×${v}</span></div>`; });
    if (!h) h = '<div style="color:var(--dim);grid-column:1/-1;">空空</div>';
    return h;
  },
  dungeon: () => {
    let h = '';
    Object.entries(D.enemies).filter(([, e]) => e.alive).forEach(([k, e]) => { h += `<div class="clickable danger" onclick="fightEnemy('${k}')"><span class="cname">👹${k}</span><span class="cinfo">Lv.${e.level}</span></div>`; });
    return h;
  },
  lobby: () => {
    let h = '';
    h += `<div style="grid-column:1/-1;text-align:center;padding:8px 0;" onclick="showRoomDialog()">
      <div class="clickable online" style="justify-content:center;">
        <span class="cname">${P2P.connected ? '🟢 联机中' : '🔴 点击联机'}</span>
      </div>
    </div>`;
    if (P2P.connected) {
      h += `<div style="grid-column:1/-1;color:var(--online);font-size:0.4rem;">你是：${P2P.isHost ? '🏠 房主' : '👤 成员'}</div>`;
      h += `<div style="grid-column:1/-1;color:var(--dim);font-size:0.36rem;">点击上方按钮进行协同攻击/交易</div>`;
    }
    if (P2P.chatMessages.length > 0) {
      h += `<div style="grid-column:1/-1;color:var(--dim);font-size:0.36rem;margin-top:4px;">💬 联机消息</div>`;
      P2P.chatMessages.slice(-5).forEach(m => {
        h += `<div class="stat-row"><span>${m.sender}</span><span>${m.content}</span></div>`;
      });
    }
    return h;
  }
};

function renderPanels() {
  const container = document.getElementById('panelContainer');
  container.innerHTML = '';
  Object.entries(panelRenderers).forEach(([key, renderer]) => {
    const det = document.createElement('details');
    det.className = 'panel';
    if (key === D.currentPanel) det.open = true;
    const titles = { main: '👤主角', warriors: '⚔️战士', bag: '🎒背包', dungeon: '👹副本', lobby: '🌐联机' };
    det.innerHTML = `<summary><span>${titles[key]}</span></summary><div class="panel-content">${renderer()}</div>`;
    container.appendChild(det);
  });
}

function showPanel(name) { D.currentPanel = name; renderPanels(); document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('active'); if (b.dataset.panel === name) b.classList.add('active'); }); }

function updateStatusBar() {
  document.getElementById('sLevel').textContent = D.player.level;
  document.getElementById('sHP').textContent = D.player.hp;
  document.getElementById('sATK').textContent = D.player.atk;
  document.getElementById('sGold').textContent = D.player.gold;
  document.getElementById('sOnline').textContent = P2P.connected ? '2' : '0';
  document.getElementById('sRound').textContent = D.round;
}

function renderAll() { updateStatusBar(); renderPanels(); }

// ==================== AI剧情 ====================
async function callAI(msg) {
  if (!D.apiKey) throw new Error('API Key');
  const msgs = [{ role: 'system', content: '你是《洛洛历险记》RPG主持人。当前：' + JSON.stringify({ player: D.player, city: D.city, round: D.round }) }, ...(D.chatHistory || [])];
  if (msg) msgs.push({ role: 'user', content: msg });
  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + D.apiKey }, body: JSON.stringify({ model: 'deepseek-chat', messages: msgs, temperature: 0.9, max_tokens: 800 }) });
  if (!resp.ok) throw new Error(`API ${resp.status}`);
  const d = await resp.json();
  const txt = d.choices[0].message.content;
  let parsed;
  try { const m = txt.match(/\{[\s\S]*\}/); parsed = JSON.parse(m ? m[0] : txt); } catch (e) { parsed = { narrative: txt, options: ['继续', '探索'], ending: '🔥' }; }
  if (msg) { if (!D.chatHistory) D.chatHistory = []; D.chatHistory.push({ role: 'user', content: msg }); D.chatHistory.push({ role: 'assistant', content: JSON.stringify(parsed) }); if (D.chatHistory.length > 30) D.chatHistory = D.chatHistory.slice(-30); }
  return parsed;
}

function renderResponse(data) {
  document.getElementById('narrative').textContent = data.narrative || '';
  document.getElementById('sysHint').textContent = data.ending || '';
  while (D.player.exp >= D.player.expToLevel) { D.player.exp -= D.player.expToLevel; D.player.level++; D.player.expToLevel = getExpToLevel(D.player.level); }
  const cDiv = document.getElementById('choices'); cDiv.innerHTML = '';
  (data.options || ['继续', '探索']).forEach((o, i) => { const b = document.createElement('button'); b.className = 'choice-btn'; b.innerHTML = `<span class="num">${i + 1}.</span>${o}`; b.onclick = () => handle(o); cDiv.appendChild(b); });
  renderAll(); autoSave();
}

async function handle(msg) { if (D.processing || !D.apiKey) return; D.processing = true; D.round++; document.getElementById('narrative').innerHTML = '⏳...'; try { const data = await callAI(msg); renderResponse(data); } catch (e) { document.getElementById('narrative').textContent = '❌ ' + e.message; } D.processing = false; autoSave(); }

// ==================== 初始化 ====================
function init() {
  const sk = localStorage.getItem('deepseek_api_key');
  if (sk) { D.apiKey = sk; document.getElementById('apiKeyInput').value = sk; document.getElementById('keyStatus').textContent = '✅'; }
  const has = loadSave();
  renderAll();
  if (has) { updateStatusBar(); document.getElementById('narrative').textContent = '📡重连。第' + D.round + '回合。点击🌐联机开始双人冒险！'; }
  document.getElementById('saveKeyBtn').onclick = () => { const k = document.getElementById('apiKeyInput').value.trim(); if (!k.startsWith('sk-')) { notify('Key以sk-开头'); return; } D.apiKey = k; localStorage.setItem('deepseek_api_key', k); document.getElementById('keyStatus').textContent = '✅'; if (!has) handle('我是洛洛，在时光之城醒来。'); };
  document.getElementById('customSendBtn').onclick = async () => { const inp = document.getElementById('customInput'); const t = inp.value.trim(); if (!t) return; inp.value = ''; await handle(t); };
  document.getElementById('customInput').onkeydown = e => { if (e.key === 'Enter') document.getElementById('customSendBtn').click(); };
  document.getElementById('btnRoom').onclick = showRoomDialog;
  document.getElementById('btnSave').onclick = () => { autoSave(); notify('💾已存档'); };
  document.getElementById('btnReset').onclick = () => { if (confirm('重开？')) { localStorage.removeItem('aeig_p2p_v1'); location.reload(); } };
  document.querySelectorAll('.nav-btn').forEach(b => { b.onclick = () => showPanel(b.dataset.panel); });
  if (!has && D.apiKey) handle('我是洛洛，在时光之城醒来。');
}
document.addEventListener('DOMContentLoaded', init);
</script>
