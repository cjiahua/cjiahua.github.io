<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>洛洛历险记 · 完全体联机</title>
<style>
  :root {
    --bg: #060b18; --panel: rgba(10,16,30,0.88); --cyan: #00d4ff; --gold: #f0c040;
    --red: #ff4060; --green: #40e890; --purple: #a070ff; --orange: #ff8040;
    --text: #d0d4e0; --dim: #6070a0; --border: rgba(0,200,255,0.22);
    --energy: #ffe860; --pink: #ff70a0; --warm: #ffb088; --online: #40e890;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;min-height:100vh;padding:4px 4px 90px;color:var(--text);overflow-x:hidden;}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 30% 10%,rgba(0,212,255,0.03) 0%,transparent 60%),radial-gradient(ellipse at 70% 90%,rgba(255,112,160,0.03) 0%,transparent 60%);}
  .game-container{max-width:650px;margin:0 auto;display:flex;flex-direction:column;gap:4px;position:relative;z-index:1;}
  .title-area{text-align:center;padding:2px 0;}
  .title-area h1{font-size:1.1rem;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--cyan),var(--warm),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 3s ease infinite;background-size:300% 300%;}
  @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .title-area .sub{font-size:0.38rem;color:var(--dim);letter-spacing:2px;}
  .status-row{display:flex;gap:1px;flex-wrap:wrap;}
  .status-card{flex:1;min-width:32px;background:var(--panel);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:6px;padding:4px 1px;text-align:center;transition:all 0.3s;}
  .status-card:hover{transform:translateY(-1px);box-shadow:0 0 10px rgba(0,212,255,0.12);}
  .status-card .lbl{font-size:0.3rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;}
  .status-card .val{font-size:0.55rem;font-weight:800;margin-top:1px;}
  .val.cyan{color:var(--cyan);}.val.gold{color:var(--gold);}.val.red{color:var(--red);}.val.green{color:var(--green);}.val.purple{color:var(--purple);}.val.orange{color:var(--orange);}.val.pink{color:var(--pink);}.val.warm{color:var(--warm);}.val.online{color:var(--online);}

  .nav-scroll{overflow-x:auto;display:flex;gap:1px;padding:1px 0;scrollbar-width:none;}
  .nav-scroll::-webkit-scrollbar{display:none;}
  .nav-btn{background:rgba(14,22,40,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.06);color:var(--dim);padding:3px 6px;border-radius:12px;font-size:0.4rem;cursor:pointer;white-space:nowrap;transition:all 0.3s;font-weight:600;}
  .nav-btn:hover,.nav-btn.active{border-color:var(--warm);color:var(--warm);background:rgba(255,176,136,0.08);}
  .nav-btn.online-tab{border-color:rgba(64,232,144,0.3);}

  .panel-grid{display:flex;flex-direction:column;gap:2px;}
  details.panel{background:var(--panel);backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:all 0.3s;}
  details.panel[open]{box-shadow:0 3px 18px rgba(0,200,255,0.08);}
  details.panel summary{padding:5px 8px;cursor:pointer;font-size:0.5rem;font-weight:700;color:var(--warm);background:linear-gradient(135deg,rgba(255,176,136,0.02),rgba(0,212,255,0.02));list-style:none;display:flex;justify-content:space-between;}
  details.panel summary::-webkit-details-marker{display:none;}
  .panel-content{padding:4px 8px;display:grid;grid-template-columns:1fr 1fr;gap:1px 4px;font-size:0.45rem;}
  .clickable{display:flex;justify-content:space-between;align-items:center;padding:3px 5px;border:1px solid rgba(255,255,255,0.03);border-radius:4px;cursor:pointer;transition:all 0.2s;margin:1px 0;grid-column:1/-1;}
  .clickable:hover{background:rgba(255,176,136,0.04);border-color:rgba(255,176,136,0.18);transform:translateX(1px);}
  .clickable .cname{font-weight:700;color:var(--warm);font-size:0.45rem;}
  .clickable .cinfo{font-size:0.38rem;color:var(--dim);}
  .clickable.usable{border-color:rgba(64,232,144,0.18);}
  .clickable.danger{border-color:rgba(255,64,96,0.18);}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.008);}
  .bar{grid-column:1/-1;height:2px;background:rgba(255,255,255,0.02);border-radius:1px;margin:1px 0;overflow:hidden;}
  .bar-fill{height:100%;border-radius:1px;transition:width 0.6s;}
  .bar-fill.hp{background:linear-gradient(90deg,#ff4060,#ff6080);}.bar-fill.en{background:linear-gradient(90deg,#00d4ff,#ffe860);}.bar-fill.ex{background:linear-gradient(90deg,#f0c040,#ffe080);}

  .story-box{background:var(--panel);backdrop-filter:blur(25px);border:1px solid var(--border);border-radius:10px;padding:8px 10px;line-height:1.6;font-size:0.62rem;min-height:20px;box-shadow:0 5px 20px rgba(0,0,0,0.3);position:relative;overflow:hidden;}
  .story-box .scene{font-size:0.38rem;color:var(--dim);letter-spacing:1.5px;margin-bottom:1px;position:relative;z-index:1;}
  .story-box .narrative{white-space:pre-wrap;position:relative;z-index:1;}
  .story-box .hint{font-size:0.42rem;color:var(--warm);margin-top:3px;font-style:italic;border-left:2px solid(var(--warm);padding-left:4px;position:relative;z-index:1;}

  .choices{display:flex;flex-direction:column;gap:1px;}
  .choice-btn{background:linear-gradient(135deg,rgba(14,22,40,0.7),rgba(10,16,35,0.8));border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:0.55rem;text-align:left;cursor:pointer;transition:all 0.3s;}
  .choice-btn:hover{background:rgba(255,176,136,0.04);border-color:var(--warm);color:var(--warm);}
  .choice-btn .num{display:inline-block;background:linear-gradient(135deg,var(--warm),var(--gold));color:#0a0f1a;width:16px;height:16px;border-radius:50%;text-align:center;line-height:16px;font-weight:900;font-size:0.48rem;margin-right:3px;}

  .input-row{display:flex;gap:2px;}
  .input-row input{flex:1;background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:14px;font-size:0.55rem;outline:none;}
  .input-row input:focus{border-color:var(--warm);}
  .input-row button{background:rgba(255,176,136,0.1);border:1px solid var(--warm);color:var(--warm);padding:5px 10px;border-radius:14px;font-weight:800;cursor:pointer;font-size:0.5rem;}

  .quick-row{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;}
  .quick-btn{width:26px;height:26px;border-radius:50%;background:rgba(14,22,40,0.6);border:1px solid rgba(255,255,255,0.07);color:var(--dim);font-size:0.3rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s;}
  .quick-btn:hover{border-color:var(--warm);color:var(--warm);transform:translateY(-1px);}
  .quick-btn .ico{font-size:0.5rem;}

  .bottom-bar{position:fixed;bottom:3px;left:50%;transform:translateX(-50%);max-width:630px;width:calc(100% - 10px);z-index:100;background:rgba(10,16,35,0.92);backdrop-filter:blur(30px);border:1px solid var(--border);border-radius:10px;padding:3px 5px;display:flex;gap:2px;align-items:center;}
  .bottom-bar input{flex:1;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.08);color:var(--text);padding:3px 5px;border-radius:6px;font-size:0.35rem;outline:none;}
  .bottom-bar button{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--dim);padding:2px 4px;border-radius:6px;font-size:0.33rem;cursor:pointer;}

  .notification{position:fixed;top:6px;left:50%;transform:translateX(-50%);background:rgba(10,16,35,0.95);backdrop-filter:blur(30px);border:1px solid var(--warm);border-radius:6px;padding:4px 10px;color:var(--warm);font-size:0.45rem;z-index:999;animation:notifySlide 0.4s ease,notifyFade 0.5s ease 2.5s forwards;max-width:90%;pointer-events:none;}
  @keyframes notifySlide{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes notifyFade{to{opacity:0;transform:translateX(-50%) translateY(-4px)}}

  .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
  .modal-overlay.active{display:flex;}
  .modal-dialog{background:var(--panel);backdrop-filter:blur(30px);border:2px solid var(--border);border-radius:12px;padding:10px;max-width:460px;width:92%;max-height:75vh;overflow-y:auto;color:var(--text);}
  .modal-dialog h3{color:var(--warm);font-size:0.65rem;margin-bottom:4px;text-align:center;}
  .modal-dialog .close-btn{float:right;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);color:var(--dim);padding:2px 6px;border-radius:4px;cursor:pointer;font-size:0.38rem;}
  .modal-dialog .chat-log{max-height:120px;overflow-y:auto;font-size:0.46rem;line-height:1.4;margin:4px 0;padding:5px;background:rgba(0,0,0,0.2);border-radius:6px;}
  .modal-dialog .chat-input-row{display:flex;gap:2px;margin-bottom:4px;}
  .modal-dialog .chat-input-row input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:8px;font-size:0.44rem;outline:none;}
  .modal-dialog .chat-input-row button{background:rgba(255,176,136,0.12);border:1px solid var(--warm);color:var(--warm);padding:4px 8px;border-radius:8px;font-weight:700;cursor:pointer;font-size:0.42rem;}
  .modal-dialog .cmd-row{display:flex;gap:1px;flex-wrap:wrap;}
  .modal-dialog .cmd-btn{background:rgba(255,176,136,0.03);border:1px solid rgba(255,255,255,0.07);color:var(--dim);padding:2px 4px;border-radius:6px;font-size:0.38rem;cursor:pointer;transition:all 0.3s;}
  .modal-dialog .cmd-btn:hover{border-color:var(--warm);color:var(--warm);}
  .mood-bar{display:flex;align-items:center;gap:3px;margin:2px 0;font-size:0.38rem;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px 3px;font-size:0.42rem;margin-bottom:4px;}

  .drawer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:998;display:none;}
  .drawer-overlay.active{display:block;}
  .sys-drawer{position:fixed;top:0;right:-100%;width:88%;max-width:400px;height:100%;background:rgba(10,16,35,0.97);backdrop-filter:blur(30px);border-left:2px solid var(--border);z-index:999;transition:right 0.35s;display:flex;flex-direction:column;}
  .sys-drawer.open{right:0;}
  .drawer-header{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;}
  .drawer-body{flex:1;overflow-y:auto;padding:8px;font-size:0.5rem;line-height:1.5;}
  .drawer-input-row{display:flex;gap:3px;padding:6px;border-top:1px solid rgba(255,255,255,0.05);}
  .drawer-input-row input{flex:1;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text);padding:5px;border-radius:8px;font-size:0.48rem;outline:none;}
  .drawer-input-row button{background:rgba(255,176,136,0.15);border:1px solid var(--warm);color:var(--warm);padding:5px 8px;border-radius:8px;cursor:pointer;font-size:0.45rem;}
</style>
</head>
<body>

<div class="game-container">
  <div class="title-area"><h1>⚙️ 洛洛历险记 · 完全体联机</h1><div class="sub" id="onlineStatus">🔴 离线 | 点 🌐联机 按钮</div></div>

  <div class="status-row">
    <div class="status-card"><div class="lbl">主角</div><div class="val cyan" id="sName">洛洛</div></div>
    <div class="status-card"><div class="lbl">Lv</div><div class="val gold" id="sLevel">1</div></div>
    <div class="status-card"><div class="lbl">HP</div><div class="val red" id="sHP">100</div></div>
    <div class="status-card"><div class="lbl">ATK</div><div class="val orange" id="sATK">15</div></div>
    <div class="status-card"><div class="lbl">DEF</div><div class="val cyan" id="sDEF">8</div></div>
    <div class="status-card"><div class="lbl">💰</div><div class="val gold" id="sGold">500</div></div>
    <div class="status-card"><div class="lbl">⭐</div><div class="val warm" id="sSPoint">0</div></div>
    <div class="status-card"><div class="lbl">🌐</div><div class="val online" id="sOnline">0</div></div>
    <div class="status-card"><div class="lbl">回合</div><div class="val pink" id="sRound">0</div></div>
  </div>

  <div class="nav-scroll" id="navRow">
    <button class="nav-btn active" data-panel="main">📋主</button><button class="nav-btn" data-panel="warriors">⚔️战士</button><button class="nav-btn" data-panel="bag">🎒背包</button><button class="nav-btn" data-panel="equip">🛡️装备</button><button class="nav-btn" data-panel="skilltree">📜技能</button><button class="nav-btn" data-panel="dungeon">👹副本</button><button class="nav-btn" data-panel="shop">🏪商店</button><button class="nav-btn" data-panel="craft">🔮合成</button><button class="nav-btn" data-panel="achieve">🏆成就</button><button class="nav-btn" data-panel="sign">📅签到</button><button class="nav-btn online-tab" data-panel="lobby">🌐联机</button>
  </div>

  <div class="panel-grid" id="panelContainer"></div>

  <div class="story-box">
    <div class="scene" id="sceneTag">· 第一章 · 初入机兽世界</div>
    <div class="narrative" id="narrative">正在加载...</div>
    <div class="hint" id="sysHint"></div>
  </div>

  <div class="choices" id="choices"></div>
  <div class="input-row"><input type="text" id="customInput" placeholder="✍ 说出你的心声..."><button id="customSendBtn">执行</button></div>
  <div class="quick-row">
    <button class="quick-btn" id="btnSys"><span class="ico">💬</span></button>
    <button class="quick-btn" id="btnRoom"><span class="ico">🌐</span></button>
    <button class="quick-btn" id="btnSave"><span class="ico">💾</span></button>
    <button class="quick-btn" id="btnSign"><span class="ico">📅</span></button>
    <button class="quick-btn" id="btnReset"><span class="ico">🔄</span></button>
  </div>
</div>

<div class="bottom-bar">
  <input type="password" id="apiKeyInput" placeholder="API Key">
  <button id="saveKeyBtn">💾Key</button>
  <span id="keyStatus">未配置</span>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-dialog" id="modalDialog"></div></div>
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="sys-drawer" id="sysDrawer">
  <div class="drawer-header"><span style="color:var(--warm);">💬 系统控制台</span><button onclick="closeDrawer()" style="background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--dim);padding:3px 7px;border-radius:6px;">✕</button></div>
  <div class="drawer-body" id="sysChatLog"><div style="color:var(--dim);">🤖 就绪。可修改数值或 /connect 联机</div></div>
  <div class="drawer-input-row"><input id="sysChatInput" placeholder="修改/联机指令..."><button id="sysChatSend">执行</button></div>
</div>

<script>
// ==================== 完整数据模型 ====================
const MOODS={FURIOUS:'😡暴怒',ANGRY:'😠愤怒',UPSET:'😞低落',NEUTRAL:'😐平静',PLEASED:'🙂愉悦',HAPPY:'😊开心',EXCITED:'🤩激动',INSPIRED:'✨振奋',GRATEFUL:'🥹感激',PROUD:'😤自豪'};
const MOOD_EMOJI={FURIOUS:'😡',ANGRY:'😠',UPSET:'😞',NEUTRAL:'😐',PLEASED:'🙂',HAPPY:'😊',EXCITED:'🤩',INSPIRED:'✨',GRATEFUL:'🥹',PROUD:'😤'};
const MOOD_LEVELS=['FURIOUS','ANGRY','UPSET','NEUTRAL','PLEASED','HAPPY','EXCITED','INSPIRED','GRATEFUL','PROUD'];
function getMoodEmoji(m){return MOOD_EMOJI[m]||'😐';}
function getMoodText(m){return MOODS[m]||'平静';}
function moodChange(c,d){const i=Math.max(0,Math.min(9,MOOD_LEVELS.indexOf(c)+d));return MOOD_LEVELS[i];}
function getExpToLevel(lv){return Math.floor(100*Math.pow(1.5,lv-1));}

const D={
  player:{name:'洛洛',level:1,hp:100,maxHp:100,atk:15,def:8,spd:10,gold:500,exp:0,expToLevel:100,skillPoints:0,mood:'PLEASED'},
  warriors:{
    '霹雳火':{name:'霹雳火',role:'守城大将',personality:'忠诚热血、重情重义',level:1,hp:150,maxHp:150,atk:25,def:15,spd:12,skill:'雷霆半月斩',skillLevel:1,loyalty:90,mood:'PROUD',chatHistory:[],memories:[]},
    '风火轮':{name:'风火轮',role:'侦察兵',personality:'活泼机灵、话多爱笑',level:1,hp:80,maxHp:80,atk:12,def:6,spd:22,skill:'旋风轮',skillLevel:1,loyalty:85,mood:'EXCITED',chatHistory:[],memories:[]}
  },
  availableWarriors:['急先锋','力霸天','冲击波','龙卷风','超音速'],
  enemies:{'金铁兽':{level:20,hp:800,maxHp:800,atk:40,def:15,spd:10,alive:true,dropTable:[{name:'修复装置',chance:0.8}]},'猛虎王':{level:45,hp:4000,maxHp:4000,atk:80,def:40,spd:20,alive:true,dropTable:[{name:'猛虎之牙',chance:0.1}]}},
  dungeons:{'能源之城外围':{level:5,enemies:['金铁兽'],rewards:{exp:30,gold:100}},'雷霆殿深处':{level:40,enemies:['猛虎王'],rewards:{exp:500,gold:1000}}},
  city:'时光之城',cities:{'时光之城':{owner:'机车族',desc:'温暖的故乡'},'能源之城':{owner:'争夺中',desc:'能源核心'},'雷霆殿':{owner:'猛兽族',desc:'猛虎王巢穴'}},
  bag:{'修复装置':3,'能量块':5,'合击技卷轴':1,'异兽蛋':1},
  equipment:{weapon:null,armor:null,accessory:null},
  equipmentDB:{'烈焰之剑':{slot:'weapon',atk:10,rarity:'精良'},'守护铠甲':{slot:'armor',def:8,hp:30,rarity:'精良'},'疾风之靴':{slot:'accessory',spd:5,rarity:'稀有'},'猛虎之牙':{slot:'weapon',atk:18,rarity:'史诗'}},
  skillTree:{'攻击强化':{level:0,max:5,cost:1,eff:'atk',val:3},'防御强化':{level:0,max:5,cost:1,eff:'def',val:2},'生命强化':{level:0,max:5,cost:1,eff:'maxHp',val:15}},
  shopItems:{'修复装置':{price:100},'能量块':{price:50},'合击技卷轴':{price:300},'异兽蛋':{price:1000}},
  recipes:{'高级修复装置':{mats:{'修复装置':3,'能量块':2}}},
  achievements:[],allAchievements:['首战告捷','副本首通','装备史诗','签到7天'],
  signIn:{days:0,todaySigned:false},round:0,chatHistory:[],apiKey:'',processing:false,currentPanel:'main'
};

// ==================== 联机系统（优化版） ====================
const P2P={pc:null,dc:null,connected:false,isHost:false,roomCode:'',chatMessages:[],onMessage:null};

function setupDataChannel(dc){
  P2P.dc=dc;
  dc.onopen=()=>{
    P2P.connected=true;
    document.getElementById('onlineStatus').innerHTML='<span class="online-dot"></span>🟢 联机中 | '+(P2P.isHost?'房主':'成员');
    document.getElementById('sOnline').textContent='2';
    notify('🌐 联机成功！');
    if(P2P.isHost)sendP2P({type:'system',content:'欢迎加入房间！'});
  };
  dc.onmessage=(e)=>{
    try{const msg=JSON.parse(e.data);if(P2P.onMessage)P2P.onMessage(msg);}catch(err){}
  };
  dc.onclose=()=>{P2P.connected=false;document.getElementById('onlineStatus').innerHTML='🔴 离线';document.getElementById('sOnline').textContent='0';notify('🔴 联机断开');};
}

async function createRoom(){
  P2P.isHost=true;P2P.pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  P2P.dc=P2P.pc.createDataChannel('game');setupDataChannel(P2P.dc);
  const offer=await P2P.pc.createOffer();await P2P.pc.setLocalDescription(offer);
  await new Promise(r=>{P2P.pc.onicecandidate=(e)=>{if(!e.candidate)r();}});
  P2P.roomCode=btoa(JSON.stringify(P2P.pc.localDescription));
  showRoomCode();
}

async function joinRoom(code){
  P2P.isHost=false;P2P.pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  P2P.pc.ondatachannel=(e)=>{setupDataChannel(e.channel);};
  const desc=JSON.parse(atob(code));await P2P.pc.setRemoteDescription(desc);
  const answer=await P2P.pc.createAnswer();await P2P.pc.setLocalDescription(answer);
  await new Promise(r=>{P2P.pc.onicecandidate=(e)=>{if(!e.candidate)r();}});
  document.getElementById('roomOverlay').classList.remove('active');
  notify('📡 已发送连接请求，等待房主确认...');
}

// ==================== 原有功能 ====================
function emotionalEvent(name,event){
  const w=D.warriors[name];if(!w)return;const old=w.mood;
  switch(event){case '被夸奖':w.mood=moodChange(w.mood,2);w.loyalty+=3;break;case '被关心':w.mood=moodChange(w.mood,3);w.loyalty+=5;break;case '战斗胜利':w.mood=moodChange(w.mood,2);w.loyalty+=2;break;case '受伤':w.mood=moodChange(w.mood,-1);w.loyalty+=1;break;}
  if(w.mood!==old)notify(`${getMoodEmoji(w.mood)} ${w.name}心情变化`);
}
function calcDamage(a,b){const base=Math.max(1,a.atk-b.def);const crit=Math.random()<0.1;return Math.floor(base*(crit?2:1)*(0.9+Math.random()*0.2));}
async function fightEnemy(enemyName){
  const enemy=D.enemies[enemyName];if(!enemy||!enemy.alive||D.player.hp<=0)return;closeModal();
  let eHp=enemy.hp,log='',turn=0;const ally=Object.values(D.warriors).find(w=>w.hp>0);
  while(eHp>0&&D.player.hp>0&&turn<50){turn++;
    const p=calcDamage(D.player,enemy);eHp-=p.dmg;log+=`⚔️-${p.dmg}${p.crit?'💥':''} `;
    if(eHp<=0){log+='🎉击败！';break;}
    if(ally&&turn%3===0)eHp-=calcDamage(ally,enemy).dmg;
    D.player.hp-=calcDamage(enemy,D.player).dmg;
  }
  if(D.player.hp>0&&eHp<=0){enemy.alive=false;D.player.exp+=enemy.level*5;D.player.gold+=enemy.level*10;
    if(enemy.dropTable)enemy.dropTable.forEach(d=>{if(Math.random()<d.chance){D.bag[d.name]=(D.bag[d.name]||0)+1;notify('🎒'+d.name);}});
    if(!D.achievements.includes('首战告捷'))checkAchievement('首战告捷');
    if(ally)emotionalEvent(ally.name,'战斗胜利');
  }
  document.getElementById('narrative').textContent=log;
  while(D.player.exp>=D.player.expToLevel){D.player.exp-=D.player.expToLevel;D.player.level++;D.player.expToLevel=getExpToLevel(D.player.level);D.player.skillPoints++;notify('⬆️Lv.'+D.player.level);}
  applyEquipStats();renderAll();autoSave();
}
function applyEquipStats(){
  let ba=0,bd=0,bh=0;
  Object.values(D.equipment).forEach(eq=>{if(eq&&D.equipmentDB[eq]){const e=D.equipmentDB[eq];ba+=e.atk||0;bd+=e.def||0;bh+=e.hp||0;}});
  Object.values(D.skillTree).forEach(s=>{if(s.level>0){if(s.eff==='atk')ba+=s.val*s.level;if(s.eff==='def')bd+=s.val*s.level;if(s.eff==='maxHp')bh+=s.val*s.level;}});
  const lv=D.player.level;D.player.atk=15+lv*2+ba;D.player.def=8+lv+bd;D.player.maxHp=100+lv*20+bh;D.player.hp=Math.min(D.player.hp,D.player.maxHp);
}
function equipItem(name){const eq=D.equipmentDB[name];if(!eq||(D.bag[name]||0)<=0)return;const old=D.equipment[eq.slot];if(old)D.bag[old]=(D.bag[old]||0)+1;D.equipment[eq.slot]=name;D.bag[name]--;applyEquipStats();notify('🛡️装备'+name);renderAll();autoSave();closeModal();}
function learnSkill(name){const s=D.skillTree[name];if(!s||s.level>=s.max||D.player.skillPoints<s.cost)return;D.player.skillPoints-=s.cost;s.level++;applyEquipStats();notify('📜'+name+'→Lv.'+s.level);renderAll();autoSave();}
function dailySign(){if(D.signIn.todaySigned)return;D.signIn.days++;D.signIn.todaySigned=true;D.player.gold+=[50,100,150,200,300,500,800][Math.min(D.signIn.days-1,6)];notify('📅签到第'+D.signIn.days+'天');if(D.signIn.days>=7)checkAchievement('签到7天');renderAll();autoSave();}
function checkAchievement(name){if(!D.achievements.includes(name)){D.achievements.push(name);notify('🏆'+name+'！');}}
function buyItem(name){const item=D.shopItems[name];if(!item||D.player.gold<item.price)return;D.player.gold-=item.price;D.bag[name]=(D.bag[name]||0)+1;notify('🛒'+name);renderAll();autoSave();}
function craftItem(name){const r=D.recipes[name];if(!r||!Object.entries(r.mats).every(([k,v])=>(D.bag[k]||0)>=v))return;Object.entries(r.mats).forEach(([k,v])=>D.bag[k]-=v);D.bag['高级修复装置']=(D.bag['高级修复装置']||0)+1;notify('🔮合成高级修复装置');renderAll();autoSave();}

function openWarriorModal(name){
  const w=D.warriors[name];if(!w)return;
  const stats=[['等级','Lv.'+w.level],['HP',w.hp+'/'+w.maxHp],['ATK',w.atk],['DEF',w.def],['技能',w.skill],['忠诚',w.loyalty],['心情',getMoodEmoji(w.mood)+' '+getMoodText(w.mood)]].map(([k,v])=>`<div class="stat-row"><span>${k}</span><span>${v}</span></div>`).join('');

  openModal(`<button class="close-btn" onclick="closeModal()">✕</button><h3>${getMoodEmoji(w.mood)} ${w.name}</h3><div class="mood-bar"><span>${getMoodEmoji(w.mood)}</span><span>${getMoodText(w.mood)}</span></div><div class="stats-grid">${stats}</div><div class="chat-log" id="warriorChat">${chat}</div><div class="chat-input-row"><input id="warriorInput" placeholder="和${w.name}说话..."><button onclick="talkToWarrior('${name}')">发送</button></div><div class="cmd-row"><button class="cmd-btn" onclick="quickTalk('${name}','夸奖')">👍</button><button class="cmd-btn" onclick="quickTalk('${name}','关心')">💕</button><button class="cmd-btn" onclick="quickTalk('${name}','鼓励')">💪</button><button class="cmd-btn" onclick="commandWarrior('${name}','出击')">⚔️</button></div>`);
}
async function talkToWarrior(name){
  const input=document.getElementById('warriorInput');const msg=input.value.trim();if(!msg)return;input.value='';
  const w=D.warriors[name];w.chatHistory.push({role:'player',content:msg});refreshWarriorChat(name);
  if(!D.apiKey){w.chatHistory.push({role:'npc',content:'（无法连接）'});refreshWarriorChat(name);return;}
  try{
    const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+D.apiKey},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:`你是${w.name}(${w.role})。性格：${w.personality}。心情：${getMoodText(w.mood)}。回复50-100字。`},{role:'user',content:msg}],temperature:0.9,max_tokens:250})});
    const d=await resp.json();w.chatHistory.push({role:'npc',content:d.choices[0].message.content});
  }catch(e){w.chatHistory.push({role:'npc',content:'通讯故障'});}
  refreshWarriorChat(name);renderAll();autoSave();
}
function refreshWarriorChat(name){const log=document.getElementById('warriorChat');if(!log)return;const w=D.warriors[name];log.innerHTML=w.chatHistory.map(m=>`<div style="color:${m.role==='player'?'var(--gold)':'var(--warm)'};">${m.role==='player'?'👤':'🤖'+w.name}：${m.content}</div>`).join('');log.scrollTop=log.scrollHeight;}
function quickTalk(name,type){const msgs={夸奖:`${name}，你太厉害了！`,关心:`${name}，你还好吗？`,鼓励:`${name}，一起加油！`};D.warriors[name].chatHistory.push({role:'player',content:msgs[type]});refreshWarriorChat(name);emotionalEvent(name,{夸奖:'被夸奖',关心:'被关心',鼓励:'被夸奖'}[type]);if(!D.apiKey){D.warriors[name].chatHistory.push({role:'npc',content:type==='夸奖'?'嘿嘿，谢谢洛洛！':type==='关心'?'我没事！':'嗯！一起战斗！'});refreshWarriorChat(name);}else talkToWarrior(name);}
async function commandWarrior(name,cmd){const w=D.warriors[name];w.chatHistory.push({role:'player',content:'[命令]'+cmd});refreshWarriorChat(name);if(!D.apiKey)return;try{const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+D.apiKey},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:`${w.name}执行：${cmd}。返回JSON：{"reply":"回应"}`},{role:'user',content:cmd}],temperature:0.8,max_tokens:200})});const d=await resp.json();const txt=d.choices[0].message.content;let reply=txt;try{const m=txt.match(/\{[\s\S]*\}/);if(m)reply=JSON.parse(m[0]).reply||txt;}catch(e){}w.chatHistory.push({role:'npc',content:reply});refreshWarriorChat(name);renderAll();autoSave();}catch(e){w.chatHistory.push({role:'npc',content:'收到！'});}}

  bag:()=>{let h='';Object.entries(D.bag).filter(([,v])=>v>0).forEach(([k,v])=>{const eq=D.equipmentDB[k];h+=`<div class="clickable usable" onclick="${eq?`equipItem('${k}')`:`notify('📦${k}×${v}')`}"><span class="cname" style="color:${eq&&RARITY_COLORS[eq.rarity]?RARITY_COLORS[eq.rarity]:'var(--warm)'};">${eq?'🛡️':''}${k}</span><span class="cinfo">×${v}${eq?' [装备]':''}</span></div>`;});if(!h)h='<div style="color:var(--dim);grid-column:1/-1;">空空</div>';return h;},
  equip:()=>{let h='';['weapon','armor','accessory'].forEach(s=>{const eq=D.equipment[s];h+=`<div class="clickable" onclick="${eq?`notify('已装备${eq}')`:`notify('空槽')`}"><span class="cname">${s==='weapon'?'⚔️':s==='armor'?'🛡️':'💍'}${s}</span><span class="cinfo">${eq||'空'}</span></div>`;});return h;},
  skilltree:()=>{let h='';h+=`<div style="grid-column:1/-1;color:var(--warm);font-size:0.38rem;">⭐技能点：${D.player.skillPoints}</div>`;Object.entries(D.skillTree).forEach(([n,s])=>{h+=`<div class="clickable${s.level<s.max?' usable':''}" onclick="learnSkill('${n}')"><span class="cname">📜${n}</span><span class="cinfo">Lv.${s.level}/${s.max} ${s.cost}点</span></div>`;});return h;},
  dungeon:()=>{let h='';Object.entries(D.dungeons).forEach(([n,d])=>{h+=`<div class="clickable" onclick="fightEnemy('${d.enemies[0]}')"><span class="cname">👹${n}</span><span class="cinfo">Lv.${d.level}</span></div>`;});return h;},

// ==================== AI剧情 ====================
function buildPrompt(){return `你是《洛洛历险记》RPG主持人。状态：${JSON.stringify({player:D.player,city:D.city,round:D.round})}。输出JSON：{"narrative":"剧情","options":["选项"],"ending":"🔥"}`;}
async function callAI(msg){
  if(!D.apiKey)throw new Error('API Key');
  const msgs=[{role:'system',content:buildPrompt()},...D.chatHistory];if(msg)msgs.push({role:'user',content:msg});
  const resp=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+D.apiKey},body:JSON.stringify({model:'deepseek-chat',messages:msgs,temperature:0.95,max_tokens:1000})});
  if(!resp.ok)throw new Error(`API ${resp.status}`);
  const d=await resp.json();const txt=d.choices[0].message.content;let parsed;
  try{const m=txt.match(/\{[\s\S]*\}/);parsed=JSON.parse(m?m[0]:txt);}catch(e){parsed={narrative:txt,options:['继续','探索'],ending:'🔥'};}
  if(msg)D.chatHistory.push({role:'user',content:msg});D.chatHistory.push({role:'assistant',content:JSON.stringify(parsed)});if(D.chatHistory.length>30)D.chatHistory=D.chatHistory.slice(-30);
  return parsed;
}
function renderResponse(data){
  document.getElementById('narrative').textContent=data.narrative||'';document.getElementById('sysHint').textContent=data.ending||'';
  while(D.player.exp>=D.player.expToLevel){D.player.exp-=D.player.expToLevel;D.player.level++;D.player.expToLevel=getExpToLevel(D.player.level);D.player.skillPoints++;notify('⬆️Lv.'+D.player.level);}
  applyEquipStats();const cDiv=document.getElementById('choices');cDiv.innerHTML='';
  (data.options||['继续','探索']).forEach((o,i)=>{const b=document.createElement('button');b.className='choice-btn';b.innerHTML=`<span class="num">${i+1}.</span>${o}`;b.onclick=()=>handle(o);cDiv.appendChild(b);});
  renderAll();autoSave();
}
async function handle(msg){if(D.processing||!D.apiKey)return;D.processing=true;D.round++;document.getElementById('narrative').innerHTML='⏳...';try{const data=await callAI(msg);renderResponse(data);}catch(e){document.getElementById('narrative').textContent='❌ '+e.message;}D.processing=false;autoSave();}

// ==================== 系统控制台 ====================
function openDrawer(){document.getElementById('sysDrawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('active');}
function closeDrawer(){document.getElementById('sysDrawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('active');}
function setByPath(path,val){const parts=path.split('.');let obj=D;for(let i=0;i<parts.length-1;i++){if(!obj[parts[i]])obj[parts[i]]={};obj=obj[parts[i]];}obj[parts[parts.length-1]]=Math.max(-999999,val);}
async function sysChatSend(){
  const input=document.getElementById('sysChatInput');const msg=input.value.trim();if(!msg)return;input.value='';
  const log=document.getElementById('sysChatLog');log.innerHTML+=`<div style="color:var(--gold);">👤 ${msg}</div>`;
  if(msg==='/connect'){showRoomDialog();return;}
  if(!D.apiKey){const actions=[];const lower=msg.toLowerCase();
    if(lower.includes('hp')){const m=msg.match(/(\d+)/);if(m)actions.push({path:'player.hp',value:parseInt(m[0])});}
    else if(lower.includes('金币')){const m=msg.match(/(\d+)/);if(m)actions.push({path:'player.gold',value:parseInt(m[0])});}
    actions.forEach(a=>setByPath(a.path,a.value));if(actions.length>0){applyEquipStats();renderAll();autoSave();log.innerHTML+='<div style="color:var(--warm);">✅ 已执行</div>';}
  }
  log.scrollTop=log.scrollHeight;
}

// ==================== 初始化 ====================
function init(){
  const sk=localStorage.getItem('deepseek_api_key');if(sk){D.apiKey=sk;document.getElementById('apiKeyInput').value=sk;document.getElementById('keyStatus').textContent='✅';}
  const has=loadSave();renderAll();if(has){updateStatusBar();document.getElementById('narrative').textContent='📡重连。第'+D.round+'回合。';}
  document.getElementById('saveKeyBtn').onclick=()=>{const k=document.getElementById('apiKeyInput').value.trim();if(!k.startsWith('sk-')){notify('Key以sk-开头');return;}D.apiKey=k;localStorage.setItem('deepseek_api_key',k);document.getElementById('keyStatus').textContent='✅';if(!has)handle('我是洛洛，在时光之城醒来。');};
  document.getElementById('customSendBtn').onclick=async()=>{const inp=document.getElementById('customInput');const t=inp.value.trim();if(!t)return;inp.value='';await handle(t);};
  document.getElementById('customInput').onkeydown=e=>{if(e.key==='Enter')document.getElementById('customSendBtn').click();};
  document.getElementById('btnSys').onclick=openDrawer;document.getElementById('sysChatSend').onclick=sysChatSend;document.getElementById('sysChatInput').onkeydown=e=>{if(e.key==='Enter')sysChatSend();};
  document.getElementById('btnRoom').onclick=showRoomDialog;
  document.getElementById('btnSign').onclick=dailySign;
  document.getElementById('btnSave').onclick=()=>{autoSave();notify('💾已存档');};
  document.getElementById('btnReset').onclick=()=>{if(confirm('重开？')){localStorage.removeItem('aeig_full_final');location.reload();}};
  document.querySelectorAll('.nav-btn').forEach(b=>{b.onclick=()=>showPanel(b.dataset.panel);});
  document.getElementById('modalOverlay').onclick=function(e){if(e.target===this)closeModal();};
  createRoomOverlay();
  if(!has&&D.apiKey)handle('我是洛洛，在时光之城醒来。');
}
document.addEventListener('DOMContentLoaded',init);
</script>
